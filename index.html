<script>

/* NAV (SAFE ADDITION) */

const bioBtn = document.getElementById("bioBtn");
const galleryBtn = document.getElementById("galleryBtn");
const exhibitionsBtn = document.getElementById("exhibitionsBtn");

const bio = document.getElementById("bio");
const gallery = document.getElementById("gallery");
const exhibitions = document.getElementById("exhibitions");
const hero = document.getElementById("hero");

function resetView(){
hero.style.display="flex";
bio.classList.remove("show");
gallery.classList.remove("show");
exhibitions.classList.remove("show");
}

bioBtn.onclick=()=> bio.classList.contains("show")?resetView():(hero.style.display="none",bio.classList.add("show"));
galleryBtn.onclick=()=> gallery.classList.contains("show")?resetView():(hero.style.display="none",gallery.classList.add("show"));
exhibitionsBtn.onclick=()=> exhibitions.classList.contains("show")?resetView():(hero.style.display="none",exhibitions.classList.add("show"));

/* ===== IMPROVED BLUR SYSTEM ===== */

const images = [
"images/thumbring.png",
"images/knotthumb.png",
"images/thumbnailegg.jpg",
"images/mercurythumbnail.png",
"images/dreamthumb.jpg"
];

const imgA = document.getElementById("imgA");
const imgB = document.getElementById("imgB");

let active = imgA;
let hidden = imgB;

function rand(min,max){return Math.random()*(max-min)+min;}
function ease(t){return 0.5 - Math.cos(Math.PI*t)/2;}

const stateMap = new Map();

function newState(){

const now = performance.now();
const baseScale = rand(1,1.4);

return {

baseScale,
targetScale: baseScale + rand(-0.05,0.05),
scaleStart: now,
scaleDuration: rand(15000,30000),

blurFrom: rand(12,20),
blurTo: rand(14,28),
blurStart: now,
blurDuration: rand(8000,16000),

xFrom:0,yFrom:0,
xTo:0,yTo:0,
moveStart: now,
moveDuration: rand(8000,16000)

};

}

function resetMotion(img){
stateMap.set(img,newState());
}

function animateLayer(img,now){

const s = stateMap.get(img);
if(!s) return;

/* SCALE (slow pulse) */
let st=(now-s.scaleStart)/s.scaleDuration;
if(st>=1){
s.baseScale=s.targetScale;
s.targetScale=s.baseScale+rand(-0.05,0.05);
s.scaleStart=now;
st=0;
}
const scale=s.baseScale+(s.targetScale-s.baseScale)*ease(st);

/* movement depends on zoom */
const range=(scale-1)*50;

/* MOVE */
let mt=(now-s.moveStart)/s.moveDuration;
if(mt>=1){
s.xFrom=s.xTo;
s.yFrom=s.yTo;
s.xTo=rand(-range,range);
s.yTo=rand(-range,range);
s.moveStart=now;
mt=0;
}

const x=s.xFrom+(s.xTo-s.xFrom)*ease(mt);
const y=s.yFrom+(s.yTo-s.yFrom)*ease(mt);

/* BLUR */
let bt=(now-s.blurStart)/s.blurDuration;
if(bt>=1){
s.blurFrom=s.blurTo;
s.blurTo=rand(14,28);
s.blurStart=now;
bt=0;
}
const blur=s.blurFrom+(s.blurTo-s.blurFrom)*ease(bt);

/* APPLY */
img.style.filter=`blur(${blur}px)`;
img.style.transform=`translate(calc(-50% + ${x}%), calc(-50% + ${y}%)) scale(${scale})`;

}

/* LOOP */
function animate(now){
animateLayer(imgA,now);
animateLayer(imgB,now);
requestAnimationFrame(animate);
}

/* SWITCH */

let i=0;

function next(){
i=(i+1)%images.length;
return images[i];
}

function switchImage(){

const src=next();
const preload=new Image();

preload.onload=()=>{

hidden.src=src;
resetMotion(hidden);

hidden.style.transition="opacity 5s linear";
active.style.transition="opacity 5s linear";

hidden.style.opacity=1;
active.style.opacity=0;

const t=active;
active=hidden;
hidden=t;

setTimeout(switchImage,10000);

};

preload.src=src;
}

/* START */

imgA.src=images[0];
imgA.style.opacity=1;

resetMotion(imgA);
resetMotion(imgB);

requestAnimationFrame(animate);
setTimeout(switchImage,8000);

</script>
