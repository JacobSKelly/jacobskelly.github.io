<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* BASE */

html,body{
width:100%;
font-family:Helvetica,Arial,sans-serif;
background:#fff;
color:#111;
text-align:center;
}

body{
display:flex;
flex-direction:column;

}

/* HEADER */

header{
padding:2vh 20px 1vh 20px;
line-height:1.2;
}

header h1{
font-size:4vh;
margin-bottom:1vh;
}

header p{
font-size:1.8vh;
color:#555;
}

/* BUTTONS */

.controls{
margin-top:6px;
}

.controls a{
font-size:0.85rem;
color:#111;
text-decoration:none;
margin:0 6px;
cursor:pointer;
}

.controls a:hover{

}

/* BLUR CENTREPIECE */

.hero{
display:flex;
justify-content:center;
align-items:center;
margin:60px 0;
}

.blur-box{
width:300px;
height:300px;
position:relative;
overflow:hidden;
}

.blur-box img{
position:absolute;
width:140%;
height:140%;
left:50%;
top:50%;
transform:translate(-50%,-50%) scale(1.14);
object-fit:cover;
opacity:0;
will-change:opacity,transform,filter;
pointer-events:none;
}

.blur-box img.active{
opacity:1;
}

/* GALLERY */

.gallery{
display:none;
grid-template-columns:repeat(3,1fr);
gap:1.5vh;
max-width:90vw;
margin:2vh auto;
}

.gallery.show{
display:grid;
}

.gallery a{
width:100%;
aspect-ratio:1/1;
background:#f5f5f5;
overflow:hidden;
text-decoration:none;
}

.gallery a img{
width:100%;
height:100%;
object-fit:cover;
object-position:bottom center;
}

/* MOBILE */

@media(max-width:768px){

.gallery{
grid-template-columns:1fr;
gap:2vh;
max-width:92vw;
}

header h1{
font-size:28px;
}

header p{
font-size:14px;
}

.blur-box{
width:260px;
height:260px;
}

}

/* DESKTOP */

@media(min-width:769px){

}

/* FOOTER */

footer{
font-size:0.8rem;
color:#777;
padding:1vh 0;
margin-top:auto;
}

footer a{
color:#777;
text-decoration:none;
}

<script>

/* ELEMENTS */

const btn = document.getElementById("galleryBtn");
const gallery = document.getElementById("gallery");
const hero = document.getElementById("hero");
const imgA = document.getElementById("imgA");
const imgB = document.getElementById("imgB");

/* GALLERY TOGGLE */

btn.addEventListener("click", () => {
gallery.classList.toggle("show");

if(gallery.classList.contains("show")){
hero.style.display = "none";
}else{
hero.style.display = "flex";
}
});


/* IMAGE LIST */

const images = [
"images/thumbring.png",
"images/knotthumb.png",
"images/thumbnailegg.jpg",
"images/mercurythumbnail.png",
"images/dreamthumb.jpg",
"images/t1.jpg",
"images/t2.jpg",
"images/t3.jpg",
"images/t4.jpg",
"images/t5.jpg",
"images/thumbnut.jpg",
"images/midtripthumb.jpg",
"images/mantisthumb.png"
];


/* RANDOM HELPERS */

function rand(min,max){
return Math.random()*(max-min)+min;
}

function randInt(max){
return Math.floor(Math.random()*max);
}

function chance(n){
return Math.random() < n;
}

function easeInOut(t){
return 0.5 - Math.cos(Math.PI * t) / 2;
}


/* SHUFFLE BAG
   random order before repeats
*/

let bag = [];
let lastImage = "";

function refillBag(){
bag = images.slice();

for(let i = bag.length - 1; i > 0; i--){
const j = Math.floor(Math.random() * (i + 1));
[bag[i], bag[j]] = [bag[j], bag[i]];
}

if(bag[0] === lastImage && bag.length > 1){
[bag[0], bag[1]] = [bag[1], bag[0]];
}
}

function nextImage(){
if(bag.length === 0){
refillBag();
}
const src = bag.shift();
lastImage = src;
return src;
}


/* LAYER STATE */

const layerState = new Map();

function newMotionState(){
const startBlur = rand(12,40);
const targetBlur = rand(12,40);

const startX = rand(-8,8);
const startY = rand(-8,8);
const targetX = rand(-8,8);
const targetY = rand(-8,8);

const startScale = rand(1.10,1.20);
const targetScale = rand(1.10,1.20);

const now = performance.now();

return {
blurFrom:startBlur,
blurTo:targetBlur,
blurStart:now,
blurDuration:rand(18000,70000),

xFrom:startX,
yFrom:startY,
xTo:targetX,
yTo:targetY,
moveStart:now,
moveDuration:rand(25000,90000),

scaleFrom:startScale,
scaleTo:targetScale
};
}

function applyImmediateState(img,state){
img.style.filter = "blur(" + state.blurFrom + "px)";
img.style.transform =
"translate(calc(-50% + " + state.xFrom + "%), calc(-50% + " + state.yFrom + "%)) scale(" + state.scaleFrom + ")";
}

function resetMotion(img){
const state = newMotionState();
layerState.set(img,state);
applyImmediateState(img,state);
}

resetMotion(imgA);
resetMotion(imgB);


/* CONTINUOUS BLUR + DRIFT */

function animateLayer(img,now){
const s = layerState.get(img);
if(!s){ return; }

/* blur */

let blurT = (now - s.blurStart) / s.blurDuration;
if(blurT >= 1){
s.blurFrom = s.blurTo;
s.blurTo = rand(12,40);
s.blurStart = now;
s.blurDuration = rand(18000,70000);
blurT = 0;
}
const blurValue = s.blurFrom + (s.blurTo - s.blurFrom) * easeInOut(Math.max(0,Math.min(1,blurT)));

/* movement */

let moveT = (now - s.moveStart) / s.moveDuration;
if(moveT >= 1){
s.xFrom = s.xTo;
s.yFrom = s.yTo;
s.scaleFrom = s.scaleTo;

s.xTo = rand(-8,8);
s.yTo = rand(-8,8);
s.scaleTo = rand(1.10,1.20);

s.moveStart = now;
s.moveDuration = rand(25000,90000);
moveT = 0;
}

const moveEase = easeInOut(Math.max(0,Math.min(1,moveT)));
const x = s.xFrom + (s.xTo - s.xFrom) * moveEase;
const y = s.yFrom + (s.yTo - s.yFrom) * moveEase;
const scale = s.scaleFrom + (s.scaleTo - s.scaleFrom) * moveEase;

img.style.filter = "blur(" + blurValue + "px)";
img.style.transform =
"translate(calc(-50% + " + x + "%), calc(-50% + " + y + "%)) scale(" + scale + ")";
}

function animate(now){
animateLayer(imgA,now);
animateLayer(imgB,now);
requestAnimationFrame(animate);
}

requestAnimationFrame(animate);


/* SLIDESHOW CONTROL */

let active = imgA;
let hidden = imgB;
let startTimes = [];


/* TIMING
   at least 20s apart
   mostly 20–60s
   sometimes longer
   no more than 4 starts in rolling 2-minute window
*/

function nextDelayMs(){

const now = Date.now();
startTimes = startTimes.filter(t => now - t < 120000);

let minDelay = 20000;
let maxDelay = 120000;

if(startTimes.length >= 4){
const waitUntil = 120000 - (now - startTimes[0]) + 1000;
minDelay = Math.max(minDelay, waitUntil);
}

if(startTimes.length === 1){
const remaining = 120000 - (now - startTimes[0]) - 20000;
if(remaining > 20000){
maxDelay = Math.min(maxDelay, remaining);
}
}

if(maxDelay < minDelay){
maxDelay = minDelay;
}

if(chance(0.78)){
return rand(minDelay, Math.min(maxDelay, 60000));
}else{
return rand(Math.max(minDelay, 60000), maxDelay);
}
}


/* APPEARANCE */

function showNextImage(){

const now = Date.now();
startTimes.push(now);
startTimes = startTimes.filter(t => now - t < 120000);

const fadeIn = chance(0.78) ? rand(20,60) : rand(60,120);
const fadeOut = chance(0.78) ? rand(20,60) : rand(60,120);

hidden.src = nextImage();
resetMotion(hidden);

/* ensure hidden layer starts invisible */
hidden.style.opacity = 0;
hidden.classList.remove("active");

/* force style flush so transition always starts cleanly */
hidden.offsetHeight;

/* fade settings */
hidden.style.transition = "opacity " + fadeIn + "s linear";
active.style.transition = "opacity " + fadeOut + "s linear";

/* crossfade */
hidden.classList.add("active");
active.classList.remove("active");

/* swap layers */
const temp = active;
active = hidden;
hidden = temp;

/* schedule next start */
setTimeout(showNextImage, nextDelayMs());
}


/* START */

imgA.src = nextImage();
resetMotion(imgA);
imgA.classList.add("active");
imgA.style.opacity = 1;

imgB.style.opacity = 0;

setTimeout(showNextImage, nextDelayMs());

</script>

</body>
