<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jacob Samuel Kelly - Portfolio</title>

<style>

/* Reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* Base */
html,body{
width:100%;
font-family:Helvetica,Arial,sans-serif;
background:#fff;
color:#111;
text-align:center;
}

body{
display:flex;
flex-direction:column;
min-height:100vh;
}

/* Header */
header{
padding:2vh 20px 1vh 20px;
line-height:1.2;
}

header h1{
font-size:4vh;
margin-bottom:1vh;
}

header p{
font-size:1.8vh;
color:#555;
}

/* Buttons */
.controls{
margin-top:6px;
}

.controls a{
font-size:0.85rem;
color:#111;
text-decoration:none;
margin:0 6px;
cursor:pointer;
}

.controls a:hover{
text-decoration:underline;
}

/* =========================
BLUR CENTREPIECE
========================= */

.hero{
width:100%;
display:flex;
justify-content:center;
align-items:center;
margin:40px 0;
}

.blur-box{

width:500px;
height:500px;
position:relative;
overflow:hidden;

}

/* blurred layers */

.blur-box img{

position:absolute;
width:100%;
height:100%;
object-fit:cover;

filter:blur(18px);
transform:scale(1.15); /* prevents blur edges showing */

opacity:0;
transition:opacity 60s linear;

}

.blur-box img.active{
opacity:1;
}


/* =========================
Gallery
========================= */

.gallery{
display:none;
grid-template-columns:repeat(3,1fr);
gap:1.5vh;
max-width:90vw;
margin:2vh auto;
}

.gallery.show{
display:grid;
}

.gallery a{
width:100%;
aspect-ratio:1/1;
background:#f5f5f5;
overflow:hidden;
text-decoration:none;
}

.gallery a img{
width:100%;
height:100%;
object-fit:cover;
object-position:bottom center;
}

/* Mobile */

@media(max-width:768px){

.gallery{
grid-template-columns:1fr;
gap:2vh;
max-width:92vw;
}

header h1{
font-size:28px;
}

header p{
font-size:14px;
}

.blur-box{
width:90vw;
height:90vw;
}

}

/* Desktop tweak */

@media(min-width:769px){

.gallery a:nth-child(4){
grid-column:1;
}

}

/* Footer */

footer{
font-size:0.8rem;
color:#777;
padding:1vh 0;
margin-top:auto;
}

footer a{
color:#777;
text-decoration:none;
}

</style>
</head>

<body>

<header>

<h1>Jacob Samuel Kelly</h1>

<p>Jacob_Kelly@hotmail.co.uk / 07575722181 / Manchester</p>

<p>contact for order requests.</p>

<div class="controls">
<a id="galleryBtn">gallery</a>
<a href="https://gofund.me/5230ddea1" target="_blank">support me</a>
</div>

</header>


<!-- BLURRED COLOUR CENTREPIECE -->

<section class="hero">

<div class="blur-box">

<img id="imgA" class="active">
<img id="imgB">

</div>

</section>


<section class="gallery" id="gallery">

<a href="layer1.html">
<img src="images/mantisthumb.png" alt="Artwork 1">
</a>

<a href="layer2.html">
<img src="images/thumbring.png" alt="Artwork 2">
</a>

<a href="layer3.html">
<img src="images/knotthumb.png" alt="Artwork 3">
</a>

<a href="layer4.html">
<img src="images/thumbnailegg.jpg" alt="Nearly Six Eggs">
</a>

<a href="layer5.html">
<img src="images/mercurythumbnail.png" alt="Mercury">
</a>

<a href="layer6.html">
<img src="images/dreamthumb.jpg" alt="Dreamscape">
</a>

<a href="layer7.html">
<img src="images/midtripthumb.jpg" alt="Nearly Four Eggs">
</a>

</section>


<footer>
<p>
<a href="https://www.instagram.com/the_fruit_that_ate_itself" target="_blank">@the_fruit_that_ate_itself</a><br>
53.4808° N, -2.2426° W
</p>
</footer>


<script>

/* ======================
Gallery Toggle
====================== */

const btn = document.getElementById("galleryBtn");
const gallery = document.getElementById("gallery");

btn.addEventListener("click", () => {
gallery.classList.toggle("show");
});


/* ======================
Blur Slideshow
====================== */

const images = [

"images/mantisthumb.png",
"images/thumbring.png",
"images/knotthumb.png",
"images/thumbnailegg.jpg",
"images/mercurythumbnail.png",
"images/dreamthumb.jpg",
"images/midtripthumb.jpg"

];

const imgA = document.getElementById("imgA");
const imgB = document.getElementById("imgB");

let index = 0;
let showingA = true;

imgA.src = images[0];

function changeImage(){

index = (index + 1) % images.length;

if(showingA){

imgB.src = images[index];
imgB.classList.add("active");
imgA.classList.remove("active");

}else{

imgA.src = images[index];
imgA.classList.add("active");
imgB.classList.remove("active");

}

showingA = !showingA;

}

/* change every minute */

setInterval(changeImage,60000);

</script>

</body>
</html>
