<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jacob Samuel Kelly - Portfolio</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* BASE */

html,body{
width:100%;
font-family:Helvetica,Arial,sans-serif;
background:#fff;
color:#111;
text-align:center;
}

body{
display:flex;
flex-direction:column;
min-height:100vh;
}

/* HEADER */

header{
padding:2vh 20px 1vh 20px;
line-height:1.2;
}

header h1{
font-size:4vh;
margin-bottom:1vh;
}

header p{
font-size:1.8vh;
color:#555;
}

/* BUTTONS */

.controls{
margin-top:6px;
}

.controls a{
font-size:0.85rem;
color:#111;
text-decoration:none;
margin:0 6px;
cursor:pointer;
}

.controls a:hover{
text-decoration:underline;
}

/* BLUR CENTREPIECE */

.hero{
display:flex;
justify-content:center;
align-items:center;
margin:60px 0;
}

.blur-box{
width:300px;
height:300px;
position:relative;
overflow:hidden;
}

.blur-box img{

position:absolute;
width:140%;
height:140%;

left:50%;
top:50%;

transform:translate(-50%,-50%);

object-fit:cover;

opacity:0;

}

.blur-box img.active{
opacity:1;
}

/* GALLERY */

.gallery{
display:none;
grid-template-columns:repeat(3,1fr);
gap:1.5vh;
max-width:90vw;
margin:2vh auto;
}

.gallery.show{
display:grid;
}

.gallery a{
width:100%;
aspect-ratio:1/1;
background:#f5f5f5;
overflow:hidden;
text-decoration:none;
}

.gallery a img{
width:100%;
height:100%;
object-fit:cover;
object-position:bottom center;
}

/* MOBILE */

@media(max-width:768px){

.gallery{
grid-template-columns:1fr;
gap:2vh;
max-width:92vw;
}

header h1{
font-size:28px;
}

header p{
font-size:14px;
}

.blur-box{
width:260px;
height:260px;
}

}

/* DESKTOP */

@media(min-width:769px){

.gallery a:nth-child(4){
grid-column:1;
}

}

/* FOOTER */

footer{
font-size:0.8rem;
color:#777;
padding:1vh 0;
margin-top:auto;
}

footer a{
color:#777;
text-decoration:none;
}

</style>
</head>

<body>

<header>

<h1>Jacob Samuel Kelly</h1>

<p>Jacob_Kelly@hotmail.co.uk / 07575722181 / Manchester</p>

<p>contact for order requests.</p>

<div class="controls">
<a id="galleryBtn">gallery</a>

</header>


<section class="hero" id="hero">

<div class="blur-box">

<img id="imgB">

<script>

/* ELEMENTS */

const btn = document.getElementById("galleryBtn");
const gallery = document.getElementById("gallery");
const hero = document.getElementById("hero");

/* GALLERY TOGGLE */

btn.addEventListener("click", () => {

gallery.classList.toggle("show");

if(gallery.classList.contains("show")){
hero.style.display = "none";
}else{
hero.style.display = "flex";
}

});


/* IMAGE LIST */

const images = [

"images/thumbring.png",
"images/knotthumb.png",
"images/thumbnailegg.jpg",
"images/mercurythumbnail.png",
"images/dreamthumb.jpg",
"images/t1.jpg",
"images/t2.jpg",
"images/t3.jpg",
"images/t4.jpg",
"images/t5.jpg",
"images/thumbnut.jpg",
"images/midtripthumb.jpg",
"images/mantisthumb.png"

];


/* RANDOMISED SLIDESHOW */

const imgA = document.getElementById("imgA");
const imgB = document.getElementById("imgB");

let active = imgA;
let hidden = imgB;

let lastIndex = -1;


/* RANDOM HELPERS */

function rand(min,max){
return Math.random()*(max-min)+min;
}

function randInt(max){
return Math.floor(Math.random()*max);
}


/* RANDOM IMAGE */

function randomImage(){

let i;

do{
i = randInt(images.length);
}
while(i === lastIndex);

lastIndex = i;

return images[i];

}


/* RANDOM BLUR */

function randomBlur(){
return rand(12,40);
}


/* RANDOM FADE TIME */

function randomFade(){

if(Math.random() < 0.7){
return rand(20,60);
}else{
return rand(60,120);
}

}


/* RANDOM DRIFT */

function randomDrift(){

return {
x: rand(-8,8),
y: rand(-8,8),
scale: rand(1.1,1.2)
};

}


/* SHOW IMAGE */

function showImage(){

const fade = randomFade();
const blur = randomBlur();
const drift = randomDrift();

hidden.src = randomImage();

hidden.style.filter = "blur("+blur+"px)";
hidden.style.transform =
"translate(calc(-50% + "+drift.x+"%), calc(-50% + "+drift.y+"%)) scale("+drift.scale+")";

hidden.style.transition = "opacity "+fade+"s linear";
active.style.transition = "opacity "+fade+"s linear";

hidden.classList.add("active");
active.classList.remove("active");

let temp = active;
active = hidden;
hidden = temp;

scheduleNext();

}


/* SCHEDULER */

function scheduleNext(){

let delay;

if(Math.random() < 0.7){
delay = rand(20,60);
}else{
delay = rand(60,120);
}

setTimeout(showImage, delay * 1000);

}


/* START */

imgA.src = randomImage();
imgA.classList.add("active");

scheduleNext();

</script>

</body>
</html>
