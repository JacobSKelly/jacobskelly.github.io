<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jacob Samuel Kelly - Portfolio</title>
<style>
/* Reset */
* { margin:0; padding:0; box-sizing:border-box; }

/* Base styles */
html, body {
  width:100%;
  font-family: Helvetica, Arial, sans-serif;
  background:#fff;
  color:#111;
  text-align:center;
  height:100%;
}
body {
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* Header */
header {
  flex:0 0 auto;
  padding:2vh 20px 1vh 20px;
  line-height:1.2;
}
header h1 { cursor: default; font-size: 4vh; margin-bottom:1vh; }
header p { cursor: default; font-size:1.8vh; color:#555; }

/* Gallery */
.gallery {
  flex:1 1 auto; /* grow to fill space so footer sticks at bottom */
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1.5vh;
  max-width:90vw;
  margin:2vh auto 2vh auto;
}
.gallery a {
  width:100%;
  aspect-ratio:1/1;
  background:#f5f5f5;
  overflow:hidden;
  text-decoration:none;
}
.gallery a img {
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:bottom center;
}

/* Mobile gallery scroll */
@media (max-width: 768px) {
  .gallery {
    display:flex;
    flex-wrap:nowrap;
    overflow-x:auto;
    gap:2vw;
    padding:1vh 2vw;
    max-width:100%;
    scroll-snap-type: x mandatory;
  }
  .gallery a {
    flex:0 0 90%;
    scroll-snap-align:center;
  }
}

/* Desktop: Force fourth image to left of second row */
@media (min-width: 769px) {
  .gallery a:nth-child(4) {
    grid-column: 1; /* first column of new row */
  }
}

/* Footer */
footer {
  flex:0 0 auto;
  font-size:0.8rem;
  color:#777;
  padding:1vh 0;
}
footer a { color:#777; text-decoration:none; }
</style>
</head>
<body>

<script>
// Mobile redirect stays on the same index page now
if (window.innerWidth <= 768) {
  window.location.href = "index.html";
}
</script>
