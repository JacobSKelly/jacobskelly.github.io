<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jacob Samuel Kelly - Portfolio</title>

<style>
*{margin:0; padding:0; box-sizing:border-box;}
html, body{width:100%; font-family:Helvetica,Arial,sans-serif; background:#fff; color:#111; text-align:center;}
body{display:flex; flex-direction:column; min-height:100vh;}
header{padding:2vh 20px 1vh 20px; line-height:1.2;}
header h1{font-size:4vh; margin-bottom:1vh;}
header p{font-size:1.8vh; color:#555;}
.controls{margin-top:6px;}
.controls a{font-size:0.85rem; color:#111; text-decoration:none; margin:0 6px; cursor:pointer;}
.controls a:hover{text-decoration:underline;}
.hero{display:flex; justify-content:center; align-items:center; margin:60px 0;}
.blur-box{width:300px; height:300px; position:relative; overflow:hidden; background:#fff;}
.blur-box img{position:absolute; width:160%; height:160%; left:50%; top:50%; transform:translate(-50%, -50%); object-fit:cover; opacity:0;}
.gallery{display:none; grid-template-columns:repeat(3,1fr); gap:1.5vh; max-width:90vw; margin:2vh auto;}
.gallery.show{display:grid;}
.gallery a{width:100%; aspect-ratio:1/1; background:#f5f5f5; overflow:hidden; text-decoration:none;}
.gallery a img{width:100%; height:100%; object-fit:cover; object-position:bottom center;}
@media(max-width:768px){.gallery{grid-template-columns:1fr; gap:2vh; max-width:92vw;} header h1{font-size:28px;} header p{font-size:14px;} .blur-box{width:260px;height:260px;}}
footer{font-size:0.8rem;color:#777; padding:1vh 0; margin-top:auto;}
footer a{color:#777; text-decoration:none;}
</style>
</head>

<body>
<header>
  <h1>Jacob Samuel Kelly</h1>
  <p>Jacob_Kelly@hotmail.co.uk / 07575722181 / Manchester</p>
  <p>contact for order requests.</p>
  <div class="controls">
    <a id="galleryBtn">gallery</a>
    <a href="https://gofund.me/5230ddea1" target="_blank">support me</a>
  </div>
</header>

<section class="hero" id="hero">
  <div class="blur-box" id="blurBox"></div>
</section>

<section class="gallery" id="gallery">
  <a href="layer1.html"><img src="images/mantisthumb.png"></a>
  <a href="layer2.html"><img src="images/thumbring.png"></a>
  <a href="layer3.html"><img src="images/knotthumb.png"></a>
  <a href="layer4.html"><img src="images/thumbnailegg.jpg"></a>
  <a href="layer5.html"><img src="images/mercurythumbnail.png"></a>
  <a href="layer6.html"><img src="images/dreamthumb.jpg"></a>
  <a href="layer7.html"><img src="images/midtripthumb.jpg"></a>
  <a href="layer8.html"><img src="images/thumbnut.jpg"></a>
</section>

<footer>
  <p>
    <a href="https://www.instagram.com/the_fruit_that_ate_itself" target="_blank">
      @the_fruit_that_ate_itself
    </a>
    <br>
    53.4808° N, -2.2426° W
  </p>
</footer>

<script>
// Elements
const btn = document.getElementById("galleryBtn");
const gallery = document.getElementById("gallery");
const hero = document.getElementById("hero");
const blurBox = document.getElementById("blurBox");

// Toggle gallery
btn.addEventListener("click", () => {
  gallery.classList.toggle("show");
  hero.style.display = gallery.classList.contains("show") ? "none" : "flex";
});

// Images list
const images = [
  "images/thumbring.png",
  "images/knotthumb.png",
  "images/thumbnailegg.jpg",
  "images/mercurythumbnail.png",
  "images/dreamthumb.jpg",
  "images/t1.jpg",
  "images/t2.jpg",
  "images/t3.jpg",
  "images/t4.jpg",
  "images/t5.jpg",
  "images/thumbnut.jpg",
  "images/midtripthumb.jpg",
  "images/mantisthumb.png"
];

const activeImages = [];

// Spawn a single image
function spawnImage() {
  const img = document.createElement("img");
  img.src = images[Math.floor(Math.random() * images.length)];
  img.style.opacity = 0;
  img.style.filter = `blur(${10 + Math.random()*30}px)`;

  const dx = (Math.random()*200)-100;
  const dy = (Math.random()*200)-100;
  img.style.transform = `translate(-50%, -50%) translate(${dx}px, ${dy}px)`;

  blurBox.appendChild(img);
  activeImages.push(img);

  // Fade in
  setTimeout(() => {
    img.style.transition = `opacity ${2000 + Math.random()*3000}ms linear`;
    img.style.opacity = 1;
  }, 50);

  // Animate blur drift
  let blurValue = parseFloat(img.style.filter.match(/(\d+\.?\d*)/)[0]);
  function animateBlur() {
    blurValue += (Math.random()*0.1-0.05);
    blurValue = Math.max(10, Math.min(40, blurValue));
    img.style.filter = `blur(${blurValue}px)`;
    requestAnimationFrame(animateBlur);
  }
  animateBlur();

  // Schedule fade out and removal
  const lifeTime = 30000 + Math.random()*90000; // 30s–2min+
  setTimeout(() => {
    const fadeDuration = 2000 + Math.random()*3000;
    img.style.transition = `opacity ${fadeDuration}ms linear`;
    img.style.opacity = 0;
    setTimeout(() => {
      if (blurBox.contains(img)) blurBox.removeChild(img);
      activeImages.splice(activeImages.indexOf(img),1);
    }, fadeDuration);
  }, lifeTime);
}

// Slow initial spawn: 1–2 images at load
for (let i=0;i<2;i++) spawnImage();

// Spawn new images slowly, random chance every 15–30s
setInterval(() => {
  if(Math.random() < 0.5) spawnImage();
}, 15000 + Math.random()*15000);

// Drift all images slowly
function driftAll() {
  activeImages.forEach(img => {
    const dx = (Math.random()*200)-100;
    const dy = (Math.random()*200)-100;
    const duration = 20000 + Math.random()*40000;
    img.style.transition = `transform ${duration}ms linear`;
    img.style.transform = `translate(-50%,-50%) translate(${dx}px, ${dy}px)`;
  });
  setTimeout(driftAll, 20000 + Math.random()*10000);
}
driftAll();
</script>
</body>
</html>
