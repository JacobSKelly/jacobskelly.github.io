<script>

/* ELEMENTS */

const btn = document.getElementById("galleryBtn");
const gallery = document.getElementById("gallery");
const hero = document.getElementById("hero");

btn.addEventListener("click", () => {

gallery.classList.toggle("show");

if(gallery.classList.contains("show")){
hero.style.display="none";
}else{
hero.style.display="flex";
}

});


/* IMAGE LIST */

const images = [

"images/thumbring.png",
"images/knotthumb.png",
"images/thumbnailegg.jpg",
"images/mercurythumbnail.png",
"images/dreamthumb.jpg",
"images/t1.jpg",
"images/t2.jpg",
"images/t3.jpg",
"images/t4.jpg",
"images/t5.jpg",
"images/thumbnut.jpg",
"images/midtripthumb.jpg",
"images/mantisthumb.png"

];


/* IMAGE ELEMENTS */

const imgA = document.getElementById("imgA");
const imgB = document.getElementById("imgB");

let showingA = true;
let lastImageIndex = -1;


/* RANDOM HELPERS */

function rand(min,max){
return Math.random()*(max-min)+min;
}

function randInt(max){
return Math.floor(Math.random()*max);
}


/* PICK RANDOM IMAGE (avoid immediate repeat) */

function randomImage(){

let i;

do{
i = randInt(images.length);
}while(i === lastImageIndex);

lastImageIndex = i;

return images[i];

}


/* RANDOM BLUR */

function randomBlur(){

return rand(12,40);

}


/* RANDOM FADE TIME (20–120 seconds but weighted) */

function randomFade(){

if(Math.random()<0.7){
return rand(20,60);
}else{
return rand(60,120);
}

}


/* RANDOM DRIFT */

function randomDrift(){

return {

x: rand(-10,10),
y: rand(-10,10),
scale: rand(1.1,1.2)

};

}


/* IMAGE APPEAR */

function showImage(){

const next = showingA ? imgB : imgA;
const current = showingA ? imgA : imgB;

next.src = randomImage();

/* random fade */

let fade = randomFade();

next.style.transition = "opacity "+fade+"s linear, transform "+fade+"s linear, filter "+fade+"s linear";
current.style.transition = "opacity "+fade+"s linear";

/* blur */

let blur = randomBlur();

next.style.filter = "blur("+blur+"px)";
current.style.filter = "blur("+blur+"px)";

/* drift */

let drift = randomDrift();

next.style.transform =
"translate(calc(-50% + "+drift.x+"%), calc(-50% + "+drift.y+"%)) scale("+drift.scale+")";

/* fade */

next.classList.add("active");
current.classList.remove("active");

showingA = !showingA;


/* schedule next appearance */

scheduleNext();

}


/* SCHEDULER */

/* ensures:
   min 20 sec
   max 120 sec
   about 2–4 images per 2 minutes
*/

function scheduleNext(){

let delay;

if(Math.random()<0.7){
delay = rand(20,60);
}else{
delay = rand(60,120);
}

setTimeout(showImage, delay*1000);

}


/* START WITH RANDOM IMAGE */

imgA.src = randomImage();
imgA.classList.add("active");

scheduleNext();

</script>
