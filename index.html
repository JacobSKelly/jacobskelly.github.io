<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jacob Samuel Kelly - Portfolio</title>

<style>

/* Reset */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* Base styles */
html, body {
  width:100%;
  font-family: Helvetica, Arial, sans-serif;
  background:#fff;
  color:#111;
  text-align:center;
  height:100%;
}

body {
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* Header */
header {
  flex:0 0 auto;
  padding:2vh 20px 1vh 20px;
  line-height:1.2;
}

header h1 {
  cursor: default;
  font-size:4vh;
  margin-bottom:1vh;
}

header p {
  cursor: default;
  font-size:1.8vh;
  color:#555;
}

/* Support button */
.support-btn {
  display:inline-block;
  margin-top:6px;
  padding:4px 10px;
  font-size:0.9rem;
  text-decoration:none;
  color:#111;
  border:1px solid #111;
}

.support-btn:hover {
  background:#111;
  color:#fff;
}

/* Gallery */
.gallery {
  flex:1 1 auto;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1.5vh;
  max-width:90vw;
  margin:2vh auto;
}

.gallery a {
  width:100%;
  aspect-ratio:1/1;
  background:#f5f5f5;
  overflow:hidden;
  text-decoration:none;
}

.gallery a img {
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:bottom center;
}

/* Mobile layout fix */
@media (max-width:768px) {

  .gallery {
    grid-template-columns:1fr;
    gap:2vh;
    max-width:92vw;
  }

  header h1 {
    font-size:28px;
  }

  header p {
    font-size:14px;
  }

}

/* Desktop: force fourth image to start second row left */
@media (min-width:769px) {

  .gallery a:nth-child(4) {
    grid-column:1;
  }

}

/* Footer */
footer {
  flex:0 0 auto;
  font-size:0.8rem;
  color:#777;
  padding:1vh 0;
}

footer a {
  color:#777;
  text-decoration:none;
}

</style>
</head>

<body>

<header>
  <h1>Jacob Samuel Kelly</h1>
  <p>Jacob_Kelly@hotmail.co.uk / 07575722181 / Manchester</p>
  <p>contact for order requests.</p>

  <p>
    <a class="support-btn" href="https://gofund.me/5230ddea1" target="_blank">support me</a>
  </p>

</header>

<section class="gallery">

  <a href="layer1.html">
    <img src="images/mantisthumb.png" alt="Artwork 1">
  </a>

  <a href="layer2.html">
    <img src="images/thumbring.png" alt="Artwork 2">
  </a>

  <a href="layer3.html">
    <img src="images/knotthumb.png" alt="Artwork 3">
  </a>

  <a href="layer4.html">
    <img src="images/thumbnailegg.jpg" alt="Nearly Six Eggs">
  </a>

  <a href="layer5.html">
    <img src="images/mercurythumbnail.png" alt="Mercury">
  </a>

  <a href="layer6.html">
    <img src="images/dreamthumb.jpg" alt="Dreamscape">
  </a>

</section>

<footer>
  <p>
    <a href="https://www.instagram.com/the_fruit_that_ate_itself" target="_blank">@the_fruit_that_ate_itself</a><br>
    53.4808° N, -2.2426° W
  </p>
</footer>

</body>
</html>
