<head>

<title>Jacob Samuel Kelly - Portfolio</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* BASE */

html,body{
width:100%;
font-family:Helvetica,Arial,sans-serif;
background:#fff;
color:#111;
text-align:center;
}

body{
display:flex;
flex-direction:column;
min-height:100vh;
}

/* HEADER */

header{
padding:2vh 20px 1vh 20px;
line-height:1.2;
}

header h1{
font-size:4vh;
margin-bottom:1vh;
}

header p{
font-size:1.8vh;
color:#555;
}

/* BUTTONS */

.controls{
margin-top:6px;
}

.controls a{
font-size:0.85rem;
color:#111;
text-decoration:none;
margin:0 6px;
cursor:pointer;
}

.controls a:hover{
text-decoration:underline;
}

/* BLUR CENTREPIECE */

.hero{
display:flex;
justify-content:center;
align-items:center;
margin:60px 0;
}

.blur-box{
width:300px;
height:300px;
position:relative;
overflow:hidden;
}

.blur-box img{
position:absolute;
width:140%;
height:140%;
left:50%;
top:50%;
transform:translate(-50%,-50%) scale(1.14);
object-fit:cover;
opacity:0;
will-change:opacity,transform,filter;
pointer-events:none;
}

/* GALLERY */

.gallery{
display:none;
grid-template-columns:repeat(3,1fr);
gap:1.5vh;
max-width:90vw;
margin:2vh auto;
}

.gallery.show{
display:grid;
}

.gallery a{
width:100%;
aspect-ratio:1/1;
background:#f5f5f5;
overflow:hidden;
text-decoration:none;
}

.gallery a img{
width:100%;
height:100%;
object-fit:cover;
object-position:bottom center;
}

/* MOBILE */

@media(max-width:768px){

.gallery{
grid-template-columns:1fr;
gap:2vh;
max-width:92vw;
}

header h1{
font-size:28px;
}

header p{
font-size:14px;
}

.blur-box{
width:260px;
height:260px;
}

}

/* DESKTOP */

@media(min-width:769px){

.gallery a:nth-child(4){
grid-column:1;
}

}

/* FOOTER */

footer{
font-size:0.8rem;
color:#777;
padding:1vh 0;
margin-top:auto;
}

footer a{
color:#777;
text-decoration:none;
}

</style>
</head>

<body>

<script>

/* ELEMENTS */

const btn = document.getElementById("galleryBtn");
const gallery = document.getElementById("gallery");
const hero = document.getElementById("hero");
const imgA = document.getElementById("imgA");
const imgB = document.getElementById("imgB");

/* GALLERY TOGGLE */

btn.addEventListener("click", () => {
gallery.classList.toggle("show");

if(gallery.classList.contains("show")){
hero.style.display = "none";
}else{
hero.style.display = "flex";
}
});


/* IMAGE LIST */

const images = [
"images/thumbring.png",
"images/knotthumb.png",
"images/thumbnailegg.jpg",
"images/mercurythumbnail.png",
"images/dreamthumb.jpg",
"images/t1.jpg",
"images/t2.jpg",
"images/t3.jpg",
"images/t4.jpg",
"images/t5.jpg",
"images/thumbnut.jpg",
"images/midtripthumb.jpg",
"images/mantisthumb.png"
];


/* HELPERS */

function rand(min,max){
return Math.random() * (max - min) + min;
}

function chance(n){
return Math.random() < n;
}

function easeInOut(t){
return 0.5 - Math.cos(Math.PI * t) / 2;
}


/* SHUFFLE BAG */

let bag = [];
let lastImage = "";

function refillBag(){
bag = images.slice();

for(let i = bag.length - 1; i > 0; i--){
const j = Math.floor(Math.random() * (i + 1));
[bag[i], bag[j]] = [bag[j], bag[i]];
}

if(bag.length > 1 && bag[0] === lastImage){
[bag[0], bag[1]] = [bag[1], bag[0]];
}
}

function nextImage(){
if(bag.length === 0){
refillBag();
}
const src = bag.shift();
lastImage = src;
return src;
}


/* LAYER MOTION */

const stateMap = new Map();

function newState(){
const now = performance.now();

return {
blurFrom: rand(12,24),
blurTo: rand(12,40),
blurStart: now,
blurDuration: rand(12000,42000),

xFrom: rand(-6,6),
yFrom: rand(-6,6),
xTo: rand(-6,6),
yTo: rand(-6,6),
moveStart: now,
moveDuration: rand(18000,50000),

scaleFrom: rand(1.12,1.18),
scaleTo: rand(1.12,1.18)
};
}

function resetMotion(img){
stateMap.set(img,newState());
}

function animateLayer(img,now){
const s = stateMap.get(img);
if(!s){ return; }

let blurT = (now - s.blurStart) / s.blurDuration;
if(blurT >= 1){
s.blurFrom = s.blurTo;
s.blurTo = rand(12,40);
s.blurStart = now;
s.blurDuration = rand(12000,42000);
blurT = 0;
}
const blurEase = easeInOut(Math.max(0,Math.min(1,blurT)));
const blurValue = s.blurFrom + (s.blurTo - s.blurFrom) * blurEase;

let moveT = (now - s.moveStart) / s.moveDuration;
if(moveT >= 1){
s.xFrom = s.xTo;
s.yFrom = s.yTo;
s.scaleFrom = s.scaleTo;

s.xTo = rand(-6,6);
s.yTo = rand(-6,6);
s.scaleTo = rand(1.12,1.18);

s.moveStart = now;
s.moveDuration = rand(18000,50000);
moveT = 0;
}
const moveEase = easeInOut(Math.max(0,Math.min(1,moveT)));
const x = s.xFrom + (s.xTo - s.xFrom) * moveEase;
const y = s.yFrom + (s.yTo - s.yFrom) * moveEase;
const scale = s.scaleFrom + (s.scaleTo - s.scaleFrom) * moveEase;

img.style.filter = "blur(" + blurValue + "px)";
img.style.transform =
"translate(calc(-50% + " + x + "%), calc(-50% + " + y + "%)) scale(" + scale + ")";
}

function animate(now){
animateLayer(imgA,now);
animateLayer(imgB,now);
requestAnimationFrame(animate);
}


/* SLIDESHOW */

let active = imgA;
let hidden = imgB;
let switchTimer = null;

function nextDelayMs(){
if(chance(0.8)){
return rand(20000,40000);
}else{
return rand(40000,70000);
}
}

function nextFadeSeconds(){
if(chance(0.8)){
return rand(18,36);
}else{
return rand(36,55);
}
}

function showNextImage(){

const nextSrc = nextImage();
const preload = new Image();

preload.onload = function(){

const fade = nextFadeSeconds();

hidden.src = nextSrc;
resetMotion(hidden);

hidden.style.transition = "none";
hidden.style.opacity = 0;

hidden.offsetHeight;

hidden.style.transition = "opacity " + fade + "s linear";
active.style.transition = "opacity " + fade + "s linear";

hidden.style.opacity = 1;
active.style.opacity = 0;

const temp = active;
active = hidden;
hidden = temp;

switchTimer = setTimeout(showNextImage, nextDelayMs());
};

preload.onerror = function(){
switchTimer = setTimeout(showNextImage, 8000);
};

preload.src = nextSrc;
}


/* START */

imgA.src = nextImage();
imgA.style.opacity = 1;
imgB.style.opacity = 0;

resetMotion(imgA);
resetMotion(imgB);

requestAnimationFrame(animate);
switchTimer = setTimeout(showNextImage, nextDelayMs());

</script>

</body>
</html>
