<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shop - Jacob Samuel Kelly</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  width:100%;
  min-height:100%;
  font-family:Helvetica, Arial, sans-serif;
  background:#fff;
  color:#111;
  text-align:center;
}

body{
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

header{
  padding:2vh 20px 1vh 20px;
  line-height:1.2;
}

header h1{
  font-size:4vh;
  margin-bottom:0.5vh;
  font-weight:normal;
}

header p{
  font-size:1.8vh;
  color:#555;
}

.shop-note{
  margin-top:10px;
  font-size:0.85rem;
  color:#666;
}

.shop{
  flex:1 1 auto;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1.5vh;
  max-width:90vw;
  margin:2vh auto 4vh auto;
  align-items:start;
}

.product{
  text-decoration:none;
  color:#111;
}

.product-image{
  width:100%;
  aspect-ratio:1/1;
  background:#f5f5f5;
  overflow:hidden;
  display:block;
}

.product-image img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:bottom center;
  display:block;
}

.product-info{
  padding-top:10px;
  line-height:1.3;
}

.product-title{
  font-size:0.95rem;
  font-weight:normal;
}

.product-price{
  font-size:0.85rem;
  color:#555;
  margin-top:4px;
}

.product-link{
  display:inline-block;
  margin-top:8px;
  font-size:0.82rem;
  color:#111;
  text-decoration:none;
  border-bottom:1px solid #111;
}

.product-link:hover{
  color:#555;
  border-bottom-color:#555;
}

.back-link{
  display:inline-block;
  margin-top:10px;
  font-size:0.85rem;
  color:#111;
  text-decoration:none;
}

.back-link:hover{
  text-decoration:underline;
}

footer{
  flex:0 0 auto;
  font-size:0.8rem;
  color:#777;
  padding:1vh 0 2vh 0;
  line-height:1.4;
}

footer a{
  color:#777;
  text-decoration:none;
}

@media(max-width:768px){
  .shop{
    grid-template-columns:1fr;
    gap:2vh;
    max-width:92vw;
  }

  header h1{
    font-size:28px;
  }

  header p{
    font-size:14px;
  }
}
</style>
</head>
<body>

<header>
  <h1>Shop</h1>
  <p>The Fruit That Ate Itself</p>
  <p class="shop-note">Big Art, Massive Deals. Quicktime. Rapid.</p>
  <a href="index.html" class="back-link">← Back to Portfolio</a>
</header>

<section class="shop">

  <div class="product">
    <a class="product-image" href="https://square.link/u/4zO8jeLV?src=sheet" target="_blank" rel="noopener noreferrer">
      <img src="images/thumbnailegg.jpg" alt="Nearly Six Eggs">
    </a>
    <div class="product-info">
      <p class="product-title">Nearly Six Eggs</p>
      <p class="product-price">£30.00</p>
      <a class="product-link" href="https://square.link/u/4zO8jeLV?src=sheet" target="_blank" rel="noopener noreferrer">buy</a>
    </div>
  </div>

</section>

<footer>
  <p>
    <a href="https://www.instagram.com/the_fruit_that_ate_itself" target="_blank" rel="noopener noreferrer">@the_fruit_that_ate_itself</a><br>
    53.4808° N, -2.2426° W
  </p>
</footer>

</body>
</html>
