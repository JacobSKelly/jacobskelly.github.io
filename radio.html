<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>radio debug</title>
  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.62);
      --line:rgba(255,255,255,.14);
      --green:#86ff8a;
      --green-dim:rgba(134,255,138,.22);
      --red:#ff2a2a;
    }

    *{box-sizing:border-box}

    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      background:var(--bg);
      color:var(--fg);
      font-family:Arial,Helvetica,sans-serif;
    }

    .page-title{
      position:fixed;
      top:16px;
      left:50%;
      transform:translateX(-50%);
      z-index:3;
      color:#fff;
      font-size:clamp(24px,4vw,42px);
      letter-spacing:.08em;
      text-transform:lowercase;
      font-weight:700;
      user-select:none;
      pointer-events:none;
    }

    .wrap{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:72px 24px 24px;
      overflow:hidden;
    }

    .radio{
      width:min(1080px, calc(100vw - 48px));
      max-width:1080px;
      border:1px solid var(--line);
      background:#000;
      padding:22px;
      display:grid;
      gap:18px;
      max-height:calc(100vh - 96px);
      overflow:hidden;
      box-shadow:0 0 0 1px rgba(255,255,255,.03) inset;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex:0 0 auto;
    }

    .title{
      font-size:clamp(22px,3vw,38px);
      text-transform:lowercase;
      line-height:.95;
      color:rgba(255,255,255,.12);
      user-select:none;
    }

    .rightCluster{
      display:grid;
      gap:10px;
      justify-items:end;
      flex:0 0 auto;
    }

    .live{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:11px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.15em;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#320000;
      transition:.2s;
    }

    .dot.on{
      background:var(--red);
      box-shadow:0 0 12px rgba(255,0,0,.7);
    }

    .clock{
      display:flex;
      align-items:center;
      gap:8px;
      user-select:none;
      min-height:64px;
      padding:6px 10px;
      border:1px solid rgba(134,255,138,.12);
      background:linear-gradient(180deg, rgba(134,255,138,.04), rgba(134,255,138,.015));
      box-shadow:
        inset 0 0 18px rgba(134,255,138,.05),
        0 0 28px rgba(134,255,138,.05);
    }

    .clock .digit{
      position:relative;
      width:30px;
      height:52px;
      filter:
        drop-shadow(0 0 6px rgba(134,255,138,.3))
        drop-shadow(0 0 18px rgba(134,255,138,.14));
    }

    .clock .colon{
      position:relative;
      width:10px;
      height:52px;
      margin:0 2px;
    }

    .clock .colon::before,
    .clock .colon::after{
      content:"";
      position:absolute;
      left:1px;
      width:8px;
      height:8px;
      border-radius:50%;
      background:rgba(134,255,138,.92);
      box-shadow:
        0 0 10px rgba(134,255,138,.45),
        0 0 22px rgba(134,255,138,.18);
    }

    .clock .colon::before{ top:12px; }
    .clock .colon::after{ bottom:12px; }

    .seg{
      position:absolute;
      background:rgba(134,255,138,.08);
      transition:background .12s ease, box-shadow .12s ease, opacity .12s ease;
      opacity:.2;
    }

    .seg.on{
      background:rgba(134,255,138,.96);
      opacity:1;
      box-shadow:
        0 0 10px rgba(134,255,138,.55),
        0 0 22px rgba(134,255,138,.2);
    }

    .seg.a,.seg.d,.seg.g{
      left:7px;
      width:16px;
      height:5px;
      clip-path:polygon(12% 0,88% 0,100% 50%,88% 100%,12% 100%,0 50%);
    }
    .seg.a{ top:0; }
    .seg.g{ top:23px; }
    .seg.d{ bottom:0; }

    .seg.b,.seg.c,.seg.e,.seg.f{
      width:5px;
      height:18px;
      clip-path:polygon(0 12%,50% 0,100% 12%,100% 88%,50% 100%,0 88%);
    }
    .seg.f{ left:0; top:3px; }
    .seg.b{ right:0; top:3px; }
    .seg.e{ left:0; bottom:3px; }
    .seg.c{ right:0; bottom:3px; }

    .channels{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:8px;
      flex:0 0 auto;
    }

    .channels button{
      min-width:0;
    }

    .channels button.active{
      border-color:var(--green);
      color:var(--green);
      box-shadow:inset 0 0 0 1px rgba(134,255,138,.1), 0 0 14px rgba(134,255,138,.05);
    }

    .screen{
      border:1px solid var(--line);
      padding:16px;
      display:grid;
      gap:14px;
      min-height:185px;
      align-content:start;
      flex:0 0 auto;
    }

    .label{
      font-size:11px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.14em;
      margin-bottom:6px;
    }

    .value{
      font-size:clamp(20px,3vw,30px);
      word-break:break-word;
      line-height:1.2;
      min-height:1.2em;
    }

    .telemetry{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px 20px;
      font-family:monospace;
      font-size:12px;
      color:var(--muted);
      border-top:1px solid var(--line);
      padding-top:12px;
    }

    .telemetry div{
      white-space:pre-wrap;
      word-break:break-word;
      min-height:7.1em;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      flex:0 0 auto;
      align-items:center;
    }

    .hint{
      font-size:11px;
      color:var(--muted);
      letter-spacing:.04em;
    }

    button{
      background:transparent;
      color:var(--fg);
      border:1px solid var(--line);
      padding:10px 14px;
      cursor:pointer;
      font-size:14px;
    }

    button:hover{
      border-color:#fff;
    }

    .log{
      border-top:1px solid var(--line);
      padding-top:12px;
      font-size:12px;
      color:var(--muted);
      line-height:1.38;
      height:6.9em;
      overflow:hidden;
      white-space:pre-wrap;
      flex:0 0 auto;
      font-family:monospace;
    }

    @media(max-width:820px){
      .top{
        display:grid;
        grid-template-columns:1fr;
      }

      .rightCluster{
        justify-items:start;
      }

      .channels{
        grid-template-columns:repeat(2,minmax(0,1fr));
      }

      .telemetry{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
<div class="page-title">radio</div>

<div class="wrap">
  <div class="radio">
    <div class="top">
      <div class="title">debug</div>

      <div class="rightCluster">
        <div class="clock" id="clock" aria-label="clock"></div>
        <div class="live">
          <div class="dot" id="dot"></div>
          <div id="liveText">standby</div>
        </div>
      </div>
    </div>

    <div class="channels">
      <button class="active" id="ch1Btn" type="button">Channel 1</button>
      <button id="ch2Btn" type="button">Channel 2</button>
      <button id="ch3Btn" type="button">Channel 3</button>
      <button id="ch4Btn" type="button">Channel 4</button>
      <button id="ch5Btn" type="button">Channel 5</button>
    </div>

    <div class="screen">
      <div>
        <div class="label">State</div>
        <div class="value" id="status">Stopped</div>
      </div>

      <div class="telemetry">
        <div id="telemetryLeft">ENG: offline
CH: 1
MODE: idle
ELAPSED: 0:00
CHAN ELAPSED: 0:00</div>
        <div id="telemetryRight">MAIN: —
TEX: —
INST: 0.00
AMB: 0.00
FX: —</div>
      </div>
    </div>

    <div class="actions">
      <button id="startBtn" type="button">Start</button>
      <button id="stopBtn" type="button">Stop</button>
      <button id="clearBtn" type="button">Clear Visible Log</button>
      <div class="hint">press <strong>}</strong> to download the full log</div>
    </div>

    <div class="log" id="log"></div>
  </div>
</div>

<audio id="music" crossorigin="anonymous" preload="auto"></audio>

function log(message){
  const stamp = new Date().toLocaleTimeString();
  const line = `[${String(++logSeq).padStart(5,'0')} ${stamp}] ${message}`;
  fullLog.push(line);
  renderVisibleLog();
  console.log(message);
}

function renderVisibleLog(){
  const visible = fullLog.slice(-5);
  els.log.textContent = visible.join('\n');
  els.log.scrollTop = els.log.scrollHeight;
}

function downloadLog(){
  const payload = fullLog.join('\n') + '\n';
  const blob = new Blob([payload], { type:'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().replace(/[:.]/g,'-');
  a.href = url;
  a.download = `radio-log-${stamp}.txt`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  log('Downloaded full log');
}

function rand(min, max){
  return Math.random() * (max - min) + min;
}

function chance(n){
  return Math.random() < n;
}

function clamp(v, min, max){
  return Math.max(min, Math.min(max, v));
}

function formatTime(sec){
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if(h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function elapsedSec(){
  return running ? (Date.now() - sessionStart) / 1000 : 0;
}

function channelElapsedSec(){
  return running ? (Date.now() - channelStart) / 1000 : 0;
}

function instability(){
  return clamp(elapsedSec() / (6 * 60 * 60), 0, 1.35);
}

function activeStation(){
  return CHANNELS[currentChannel];
}

function ambienceBias(){
  const station = activeStation();
  const t = instability();
  const chDrift = clamp(channelElapsedSec() / 160, 0, 1);
  const tide = (Math.sin(elapsedSec() / 95) + 1) * 0.5;

  if(station.mode === 'all-clean'){
    return clamp(0.45 + tide * 0.25, 0, 1);
  }
  if(station.mode === 'dead-air'){
    return clamp(0.62 + tide * 0.22, 0, 1);
  }
  if(station.mode === 'textures-only'){
    return clamp(0.38 + chDrift * 0.22 + tide * 0.18 + t * 0.08, 0, 1);
  }
  if(station.mode === 'centrepieces-only'){
    return clamp(0.22 + chDrift * 0.18 + tide * 0.14 + t * 0.06, 0, 1);
  }
  return clamp(0.28 + chDrift * 0.18 + tide * 0.2 + t * 0.1, 0, 1);
}

function setLive(on){
  els.dot.classList.toggle('on', on);
  els.liveText.textContent = on ? 'live' : 'standby';
}

function createDigit(){
  const digit = document.createElement('div');
  digit.className = 'digit';
  ['a','b','c','d','e','f','g'].forEach(name => {
    const seg = document.createElement('div');
    seg.className = `seg ${name}`;
    digit.appendChild(seg);
  });
  return digit;
}

function renderClock(text){
  els.clock.innerHTML = '';
  for(const ch of text){
    if(ch === ':'){
      const colon = document.createElement('div');
      colon.className = 'colon';
      els.clock.appendChild(colon);
      continue;
    }
    const digit = createDigit();
    const active = DIGIT_MAP[ch] || [];
    active.forEach(name => {
      const seg = digit.querySelector(`.${name}`);
      if(seg) seg.classList.add('on');
    });
    els.clock.appendChild(digit);
  }
}

function updateClock(){
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  renderClock(`${hh}:${mm}`);
}

function updateTelemetry(){
  const ctxState = audioCtx ? audioCtx.state : 'none';
  const fxText = audioCtx
    ? `m ${mainGain ? mainGain.gain.value.toFixed(2) : '0.00'} / t ${textureGain ? textureGain.gain.value.toFixed(2) : '0.00'} / n ${noiseGain ? noiseGain.gain.value.toFixed(2) : '0.00'} / a ${ambientGain ? ambientGain.gain.value.toFixed(2) : '0.00'}`
    : '—';

  els.telemetryLeft.textContent =
`ENG: ${ctxState}
CH: ${currentChannel}
MODE: ${currentMode}
ELAPSED: ${formatTime(elapsedSec())}
CHAN ELAPSED: ${formatTime(channelElapsedSec())}`;

  els.telemetryRight.textContent =
`MAIN: ${currentTrack ? currentTrack.title : '—'}
TEX: ${currentTexture ? currentTexture.title : '—'}
INST: ${instability().toFixed(2)}
AMB: ${ambienceBias().toFixed(2)}
FX: ${fxText}`;
}

function refillBags(){
  const station = activeStation();
  centrepieceBag = station.centrepieces.slice();
  textureBag = station.textures.slice();

  for(let i = centrepieceBag.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [centrepieceBag[i], centrepieceBag[j]] = [centrepieceBag[j], centrepieceBag[i]];
  }

  for(let i = textureBag.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [textureBag[i], textureBag[j]] = [textureBag[j], textureBag[i]];
  }
}

function nextCentrepiece(){
  if(centrepieceBag.length === 0) refillBags();
  return centrepieceBag.shift() || null;
}

function nextTexture(){
  if(textureBag.length === 0) refillBags();
  return textureBag.shift() || null;
}

function nextAnyFromChannel4(){
  const station = activeStation();
  if(station.mode !== 'all-clean') return nextCentrepiece();
  if(centrepieceBag.length === 0) refillBags();
  return centrepieceBag.shift() || null;
}
function allTracksForChannel(channel){
  const station = CHANNELS[channel];
  return [...station.centrepieces, ...station.textures];
}

function findTrackBySrc(channel, src){
  if(!src) return null;
  return allTracksForChannel(channel).find(track => track.src === src) || null;
}

function saveCurrentChannelState(){
  if(!running) return;

  if(currentChannel === 5) return;

  let currentTime = 0;

  try{

function setChannel(channel){

function makeDistortionCurve(amount = 0){
  const samples = 44100;
  const curve = new Float32Array(samples);
  const k = Math.max(0, amount);

  for(let i = 0; i < samples; i++){
    const x = i * 2 / samples - 1;
    curve[i] = ((3 + k) * x * 20 * Math.PI / 180) / (Math.PI + k * Math.abs(x));
  }

  return curve;
}

async function ensureAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    mainSource = audioCtx.createMediaElementSource(els.music);
    textureSource = audioCtx.createMediaElementSource(els.texture);

    masterGain = audioCtx.createGain();
    mainGain = audioCtx.createGain();
    textureGain = audioCtx.createGain();
    noiseGain = audioCtx.createGain();
    humGain = audioCtx.createGain();
    ambientGain = audioCtx.createGain();

    mainDrive = audioCtx.createWaveShaper();
    mainDrive.curve = makeDistortionCurve(0);
    mainDrive.oversample = '2x';

    mainFilter = audioCtx.createBiquadFilter();
    mainFilter.type = 'lowpass';
    mainFilter.frequency.value = 18000;

    textureDrive = audioCtx.createWaveShaper();
    textureDrive.curve = makeDistortionCurve(80);
    textureDrive.oversample = '2x';

    textureFilter = audioCtx.createBiquadFilter();
    textureFilter.type = 'bandpass';
    textureFilter.frequency.value = 1300;
    textureFilter.Q.value = 0.8;

    mainSend = audioCtx.createGain();
    mainDelay = audioCtx.createDelay(4.0);
    mainFeedback = audioCtx.createGain();
    mainWet = audioCtx.createGain();

    ambientLP = audioCtx.createBiquadFilter();
    ambientLP.type = 'lowpass';
    ambientLP.frequency.value = 2400;

    ambientDelay = audioCtx.createDelay(8.0);
    ambientFeedback = audioCtx.createGain();
    ambientWet = audioCtx.createGain();

    masterGain.gain.value = 0.95;
    mainGain.gain.value = 0;
    textureGain.gain.value = 0;
    noiseGain.gain.value = 0;
    humGain.gain.value = 0;
    ambientGain.gain.value = 1;

    mainSend.gain.value = 0.10;
    mainDelay.delayTime.value = 0.22;
    mainFeedback.gain.value = 0.24;
    mainWet.gain.value = 0.18;

    ambientDelay.delayTime.value = 1.8;
    ambientFeedback.gain.value = 0.55;
    ambientWet.gain.value = 0.14;

    mainSource.connect(mainDrive);
    mainDrive.connect(mainFilter);
    mainFilter.connect(mainGain);
    mainGain.connect(masterGain);

    textureSource.connect(textureDrive);
    textureDrive.connect(textureFilter);
    textureFilter.connect(textureGain);
    textureGain.connect(masterGain);

    mainFilter.connect(mainSend);
    mainSend.connect(mainDelay);
    mainDelay.connect(mainWet);
    mainWet.connect(masterGain);
    mainDelay.connect(mainFeedback);
    mainFeedback.connect(mainDelay);

    mainFilter.connect(ambientLP);
    ambientLP.connect(ambientDelay);
    ambientDelay.connect(ambientWet);
    ambientWet.connect(ambientGain);
    ambientGain.connect(masterGain);
    ambientDelay.connect(ambientFeedback);
    ambientFeedback.connect(ambientDelay);

    noiseGain.connect(masterGain);
    humGain.connect(masterGain);
    masterGain.connect(audioCtx.destination);

    log(`AudioContext created (${audioCtx.state})`);
  }

  if(audioCtx.state === 'suspended'){
    await audioCtx.resume();
    log(`AudioContext resumed (${audioCtx.state})`);
  }

  updateTelemetry();
}

function fadeGain(gainNode, target, seconds){
  if(!audioCtx || !gainNode) return;
  const now = audioCtx.currentTime;
  gainNode.gain.cancelScheduledValues(now);
  gainNode.gain.setValueAtTime(gainNode.gain.value, now);
  gainNode.gain.linearRampToValueAtTime(target, now + seconds);
}

function clearTimers(){
  clearTimeout(gapTimer);
  overlayTimers.forEach(id => clearTimeout(id));
  overlayTimers = [];
}

function stopOneShotNodes(){
  activeNodeStops.forEach(fn => {

  });
  activeNodeStops = [];
}

function stopAllFX(){

  stopOneShotNodes();

function makeFilteredNoise(durationSec, config = {}){
  const now = audioCtx.currentTime;
  const buffer = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * durationSec), audioCtx.sampleRate);
  const data = buffer.getChannelData(0);

  for(let i = 0; i < data.length; i++){
    data[i] = (Math.random() * 2 - 1) * (config.noiseLevel || 0.24);
  }

  const src = audioCtx.createBufferSource();
  src.buffer = buffer;

  const pre = audioCtx.createBiquadFilter();
  pre.type = config.preType || 'lowpass';
  pre.frequency.value = config.preFreq || 1200;

  const band = audioCtx.createBiquadFilter();
  band.type = config.bandType || 'bandpass';
  band.frequency.value = config.bandFreq || 900;
  band.Q.value = config.bandQ || 0.7;

  const gain = audioCtx.createGain();
  gain.gain.value = 0.0001;

  src.connect(pre);
  pre.connect(band);
  band.connect(gain);
  gain.connect(noiseGain);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(config.peak || 0.05, now + (config.attack || 1.5));
  gain.gain.exponentialRampToValueAtTime(0.0001, now + durationSec);

  src.start(now);
  src.stop(now + durationSec + 0.05);

  const stop = () => {
    try{ src.stop(); }catch(e){}
    [src, pre, band, gain].forEach(node => {
      try{ node.disconnect(); }catch(e){}
    });
  };

  activeNodeStops.push(stop);
  return stop;
}

function makeHumCluster(durationSec, peak = 0.024){
  const now = audioCtx.currentTime;
  const base = chance(0.5) ? 50 : 60;

  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const osc3 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc1.type = 'sine';
  osc2.type = 'sine';
  osc3.type = 'triangle';

  osc1.frequency.value = base;
  osc2.frequency.value = base * 2;
  osc3.frequency.value = base * 0.5;

  gain.gain.value = 0.0001;

  osc1.connect(gain);
  osc2.connect(gain);
  osc3.connect(gain);
  gain.connect(humGain);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(peak, now + 1.2);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + durationSec);

  osc1.start(now);
  osc2.start(now);
  osc3.start(now);
  osc1.stop(now + durationSec + 0.05);
  osc2.stop(now + durationSec + 0.05);
  osc3.stop(now + durationSec + 0.05);

  const stop = () => {
    try{ osc1.stop(); }catch(e){}
    try{ osc2.stop(); }catch(e){}
    try{ osc3.stop(); }catch(e){}
    [osc1, osc2, osc3, gain].forEach(node => {
      try{ node.disconnect(); }catch(e){}
    });
  };

  activeNodeStops.push(stop);
  return stop;
}

function makeValveSweep(durationSec, peak = 0.02){
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const filter = audioCtx.createBiquadFilter();
  const gain = audioCtx.createGain();

  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(70, now);
  osc.frequency.exponentialRampToValueAtTime(430, now + durationSec * 0.42);
  osc.frequency.exponentialRampToValueAtTime(95, now + durationSec);

  filter.type = 'lowpass';
  filter.frequency.value = 1100;

  gain.gain.value = 0.0001;

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(noiseGain);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(peak, now + 0.45);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + durationSec);

  osc.start(now);
  osc.stop(now + durationSec + 0.05);

  const stop = () => {
    try{ osc.stop(); }catch(e){}
    [osc, filter, gain].forEach(node => {
      try{ node.disconnect(); }catch(e){}
    });
  };

  activeNodeStops.push(stop);
  return stop;
}

function triggerCrackle(){
  if(!audioCtx || !running) return;
  if(activeStation().mode === 'all-clean') return;

  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const filter = audioCtx.createBiquadFilter();
  const gain = audioCtx.createGain();

  osc.type = chance(0.6) ? 'square' : 'sawtooth';
  osc.frequency.value = rand(120, 1800);

  filter.type = chance(0.5) ? 'bandpass' : 'highpass';
  filter.frequency.value = rand(500, 3200);
  filter.Q.value = rand(0.4, 8);

  gain.gain.value = 0.0001;

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(noiseGain);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(rand(0.012, 0.08), now + 0.008);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + rand(0.04, 0.16));

  osc.start(now);
  osc.stop(now + 0.2);

  const stop = () => {
    try{ osc.stop(); }catch(e){}
    [osc, filter, gain].forEach(node => {
      try{ node.disconnect(); }catch(e){}
    });
  };

  activeNodeStops.push(stop);
}

function crackleLoop(){
  if(!running) return;
  const station = activeStation();
  if(station.mode === 'all-clean'){
    crackleTimer = setTimeout(crackleLoop, rand(1800, 3400));
    return;
  }
  const p = station.mode === 'dead-air'
    ? 0.18 + instability() * 0.22
    : 0.28 + instability() * 0.32;
  if(chance(p)) triggerCrackle();
  crackleTimer = setTimeout(crackleLoop, rand(450, 1800));
}

function updateProcessing(){
  if(!audioCtx) return;

  const station = activeStation();
  const t = instability();
  const ambient = ambienceBias();
  const clean = station.mode === 'all-clean';
  const deadAir = station.mode === 'dead-air';
  const texturesOnly = station.mode === 'textures-only';
  const centreOnly = station.mode === 'centrepieces-only';

  const distortionBase = clean ? 3 : deadAir ? 18 : texturesOnly ? 65 : centreOnly ? 38 : 52;
  const distortionRange = clean ? 12 : deadAir ? 55 : texturesOnly ? 120 : centreOnly ? 90 : 140;
  const mainAmount = deadAir ? 0 : clamp(distortionBase + (1 - ambient) * distortionRange + t * (clean ? 8 : 65), 0, 300);
  const textureAmount = clean ? 0 : clamp(30 + (1 - ambient) * (texturesOnly ? 170 : 120) + t * 80, 0, 320);

  mainDrive.curve = makeDistortionCurve(mainAmount);
  textureDrive.curve = makeDistortionCurve(textureAmount);

  const mainCut = clean
    ? 18500 - ambient * 4500 - t * 1200
    : deadAir
      ? 7000 - ambient * 2200
      : 17800 - (1 - ambient) * 8200 - t * 7800;

  const textureBand = clean ? 1600 : 700 + ambient * 700 + Math.random() * 900;

  mainFilter.frequency.setTargetAtTime(Math.max(700, mainCut), audioCtx.currentTime, 0.7);
  textureFilter.frequency.setTargetAtTime(textureBand, audioCtx.currentTime, 0.7);

  const slapSend = clean
    ? 0.05 + ambient * 0.06
    : deadAir
      ? 0.08 + ambient * 0.04
      : 0.07 + (1 - ambient) * 0.10 + t * 0.10;

  const slapDelay = clean
    ? 0.22 + ambient * 0.2
    : 0.18 + (1 - ambient) * 0.16 + t * 0.2;

  const slapFeedback = clean
    ? 0.12 + ambient * 0.1
    : 0.18 + (1 - ambient) * 0.12 + t * 0.16;

  const slapWet = clean
    ? 0.10 + ambient * 0.08
    : 0.14 + (1 - ambient) * 0.08 + t * 0.08;

  mainSend.gain.setTargetAtTime(deadAir ? 0.02 : slapSend, audioCtx.currentTime, 0.7);
  mainDelay.delayTime.setTargetAtTime(slapDelay, audioCtx.currentTime, 0.7);
  mainFeedback.gain.setTargetAtTime(slapFeedback, audioCtx.currentTime, 0.7);
  mainWet.gain.setTargetAtTime(deadAir ? 0.04 : slapWet, audioCtx.currentTime, 0.7);

  ambientLP.frequency.setTargetAtTime(
    clean ? 4800 + ambient * 1200 : 1600 + ambient * 3000,
    audioCtx.currentTime,
    0.8
  );
  ambientDelay.delayTime.setTargetAtTime(
    deadAir ? 2.8 + ambient * 2.2 : 0.9 + ambient * 3.6,
    audioCtx.currentTime,
    0.8
  );
  ambientFeedback.gain.setTargetAtTime(
    clean ? 0.45 + ambient * 0.2 : deadAir ? 0.62 + ambient * 0.18 : 0.42 + ambient * 0.34,
    audioCtx.currentTime,
    0.8
  );
  ambientWet.gain.setTargetAtTime(
    clean ? 0.12 + ambient * 0.16 : deadAir ? 0.16 + ambient * 0.22 : 0.10 + ambient * 0.24,
    audioCtx.currentTime,
    0.8
  );

  updateTelemetry();
}

function startValveRadioStartup(){
  const station = activeStation();

  currentMode = station.mode === 'dead-air' ? 'dead air' : 'startup';
  updateTelemetry();

  if(station.mode === 'all-clean'){
    makeHumCluster(8, 0.012);
    makeValveSweep(4.5, 0.009);
    log('Clean startup engaged');
    return;
  }

  makeFilteredNoise(14 + rand(2,6), {
    preType:'highpass',
    preFreq:station.mode === 'dead-air' ? 300 : 520,
    bandType:'bandpass',
    bandFreq:station.mode === 'dead-air' ? 720 : 1350,
    bandQ:0.62,
    peak:station.mode === 'dead-air' ? 0.07 : 0.11,
    attack:1.8,
    noiseLevel:0.28
  });

  makeHumCluster(station.mode === 'dead-air' ? 22 : 18, station.mode === 'dead-air' ? 0.034 : 0.028);
  makeValveSweep(station.mode === 'dead-air' ? 12 : 10, station.mode === 'dead-air' ? 0.018 : 0.028);

  overlayTimers.push(setTimeout(() => {
    makeFilteredNoise(10 + rand(4,8), {
      preType:'lowpass',
      preFreq:1100,
      bandType:'bandpass',
      bandFreq:station.mode === 'textures-only' ? 980 : 680,
      bandQ:0.42,
      peak:0.07,
      attack:1.3,
      noiseLevel:0.25
    });
  }, 1200));

  overlayTimers.push(setTimeout(() => {
    for(let i = 0; i < 5; i++){
      overlayTimers.push(setTimeout(triggerCrackle, rand(0, 2400)));
    }
  }, 700));

  log(station.mode === 'dead-air' ? 'Dead-air startup engaged' : 'Valve startup storm engaged');
}

function chooseTrackForChannel(){
  const station = activeStation();
  if(station.mode === 'textures-only') return nextTexture();
  if(station.mode === 'centrepieces-only') return nextCentrepiece();
  if(station.mode === 'all-clean') return nextAnyFromChannel4();
  if(station.mode === 'main') return nextCentrepiece();
  return null;
}

async function playTextureSnippet(style = 'overlay'){
  const station = activeStation();
  if(station.mode === 'all-clean' || station.mode === 'dead-air') return;
  if(station.textures.length === 0) return;

  const track = nextTexture();
  if(!track) return;

  currentTexture = track;
  updateTelemetry();

  const ambient = ambienceBias();
  const duration = style === 'gap' ? rand(10, 24) : rand(7, 18);
  const playRate = style === 'gap' ? rand(0.42, 0.78) : rand(0.62, 1.02);
  const targetGain = style === 'gap'
    ? rand(0.2, 0.38) + ambient * 0.05
    : rand(0.08, 0.22) + ambient * 0.03;

  return new Promise((resolve) => {
    const audio = els.texture;
    audio.pause();
    audio.src = track.src;
    audio.load();

    const finish = () => {
      currentTexture = null;
      updateTelemetry();
      resolve();
    };

    const fail = (msg) => {
      log(`Texture skip: ${track.title} / ${msg}`);
      audio.removeEventListener('loadedmetadata', onMeta);
      audio.removeEventListener('error', onErr);
      finish();
    };

    const onErr = () => fail('could not decode');

    const onMeta = async () => {
      try{
        if(Number.isFinite(audio.duration) && audio.duration > duration + 1){
          audio.currentTime = rand(0, Math.max(0, audio.duration - duration - 1));
        }

        audio.playbackRate = playRate;
        await audio.play();

        fadeGain(textureGain, targetGain, rand(1.5, 4));

        overlayTimers.push(setTimeout(() => {
          fadeGain(textureGain, 0, rand(1.5, 4));
        }, Math.max(2000, (duration - rand(1.2, 3.5)) * 1000)));

        overlayTimers.push(setTimeout(() => {
          try{ audio.pause(); }catch(e){}
          finish();
        }, duration * 1000));

        log(`Texture ${style}: ${track.title}`);
      } catch(err){
        fail(err.message || err);
      } finally {
        audio.removeEventListener('loadedmetadata', onMeta);
        audio.removeEventListener('error', onErr);
      }
    };

    audio.addEventListener('loadedmetadata', onMeta);
    audio.addEventListener('error', onErr);
  });
}

async function reverseGhostLayer(){
  const station = activeStation();
  if(station.mode === 'all-clean' || station.mode === 'dead-air') return;
  if(!running || !currentTrack || !Number.isFinite(els.music.duration)) return;
  if(els.music.duration < 12) return;

  const duration = rand(6, 12);
  const startTime = Math.max(0, els.music.currentTime - rand(2, 8));
  const endTime = Math.min(els.music.duration, startTime + duration);

  try{
    const response = await fetch(currentTrack.src);
    const arr = await response.arrayBuffer();
    const decoded = await audioCtx.decodeAudioData(arr.slice(0));

    const sourceChannel = decoded.numberOfChannels > 1 ? 0 : 0;
    const channelData = decoded.getChannelData(sourceChannel);
    const sliceStart = Math.floor(startTime * decoded.sampleRate);
    const sliceEnd = Math.floor(endTime * decoded.sampleRate);
    const slice = channelData.slice(sliceStart, sliceEnd).reverse();

    const buffer = audioCtx.createBuffer(1, slice.length, decoded.sampleRate);
    buffer.copyToChannel(slice, 0);

    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    src.playbackRate.value = rand(0.28, 0.58);

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = rand(650, 1700);

    const drive = audioCtx.createWaveShaper();
    drive.curve = makeDistortionCurve(90 + rand(0,80));

    const gain = audioCtx.createGain();
    gain.gain.value = 0.0001;

    const delay = audioCtx.createDelay(5.0);
    delay.delayTime.value = rand(0.6, 2.4);

    const wet = audioCtx.createGain();
    wet.gain.value = rand(0.1, 0.22);

    const feedback = audioCtx.createGain();
    feedback.gain.value = rand(0.26, 0.48);

    src.connect(filter);
    filter.connect(drive);
    drive.connect(gain);
    gain.connect(masterGain);

    gain.connect(delay);
    delay.connect(wet);
    wet.connect(masterGain);
    delay.connect(feedback);
    feedback.connect(delay);

    const now = audioCtx.currentTime;
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(rand(0.028, 0.065), now + 2.4);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration + 5);

    src.start(now);
    src.stop(now + duration + 5);

    const stop = () => {
      try{ src.stop(); }catch(e){}
      [src, filter, drive, gain, delay, wet, feedback].forEach(node => {
        try{ node.disconnect(); }catch(e){}
      });
    };

    activeNodeStops.push(stop);
    log('Reverse ghost inserted');
  } catch(err){
    log(`Reverse ghost skipped: ${err.message || err}`);
  }
}

function makeAmbientWash(durationSec = rand(10, 26)){
  if(!audioCtx || !running) return;

  const now = audioCtx.currentTime;
  const oscA = audioCtx.createOscillator();
  const oscB = audioCtx.createOscillator();
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  const gain = audioCtx.createGain();

  oscA.type = chance(0.5) ? 'sine' : 'triangle';
  oscB.type = 'sine';
  oscA.frequency.value = rand(90, 220);
  oscB.frequency.value = oscA.frequency.value * rand(0.5, 1.5);

  filter.type = 'lowpass';
  filter.frequency.value = rand(800, 2200);

  lfo.type = 'sine';
  lfo.frequency.value = rand(0.03, 0.11);
  lfoGain.gain.value = rand(120, 700);

  gain.gain.value = 0.0001;

  oscA.connect(filter);
  oscB.connect(filter);
  filter.connect(gain);
  gain.connect(ambientGain);

  lfo.connect(lfoGain);
  lfoGain.connect(filter.frequency);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(rand(0.012, 0.05), now + rand(2, 5));
  gain.gain.exponentialRampToValueAtTime(0.0001, now + durationSec);

  oscA.start(now);
  oscB.start(now);
  lfo.start(now);
  oscA.stop(now + durationSec + 0.1);
  oscB.stop(now + durationSec + 0.1);
  lfo.stop(now + durationSec + 0.1);

  const stop = () => {
    try{ oscA.stop(); }catch(e){}
    try{ oscB.stop(); }catch(e){}
    try{ lfo.stop(); }catch(e){}
    [oscA, oscB, lfo, lfoGain, filter, gain].forEach(node => {
      try{ node.disconnect(); }catch(e){}
    });
  };

  activeNodeStops.push(stop);
  log('Ambient wash inserted');
}

function scheduleTrackIncidents(){
  if(!running) return;

  const station = activeStation();
  const t = instability();
  const amb = ambienceBias();

  if(station.mode === 'dead-air'){
    overlayTimers.push(setTimeout(() => {
      if(running){
        makeFilteredNoise(rand(18, 34), {
          preType:'highpass',
          preFreq:260,
          bandType:'bandpass',
          bandFreq:540,
          bandQ:0.42,
          peak:0.07,
          attack:2.2,
          noiseLevel:0.32
        });
        log('Dead-air rumble bloom');
      }
    }, rand(4000, 12000)));

    overlayTimers.push(setTimeout(() => {
      if(running && chance(0.65)) makeAmbientWash(rand(16, 34));
    }, rand(6000, 14000)));

    return;
  }

  if(station.mode === 'main'){
    const overlayCount = 2 + Math.floor(t * 2);
    for(let i = 0; i < overlayCount; i++){
      overlayTimers.push(setTimeout(() => {
        if(running) playTextureSnippet('overlay');
      }, rand(8000, 55000)));
    }
  }

  if(station.mode === 'textures-only'){
    const extra = 2 + Math.floor(amb * 2);
    for(let i = 0; i < extra; i++){
      overlayTimers.push(setTimeout(() => {
        if(running && chance(0.75)) makeAmbientWash(rand(8, 20));
      }, rand(4000, 24000)));
    }
  }

  if(station.mode === 'centrepieces-only'){
    if(chance(0.55 + t * 0.18)){
      overlayTimers.push(setTimeout(() => {
        if(running) reverseGhostLayer();
      }, rand(14000, 65000)));
    }
  }

  if(station.mode !== 'all-clean' && chance(0.35 + amb * 0.32)){
    overlayTimers.push(setTimeout(() => {
      if(running) makeAmbientWash(rand(10, 28));
    }, rand(7000, 34000)));
  }

  if(station.mode !== 'textures-only' && station.mode !== 'all-clean' && chance(0.45 + t * 0.22)){
    overlayTimers.push(setTimeout(() => {
      if(running) reverseGhostLayer();
    }, rand(15000, 60000)));
  }

  if(station.mode !== 'all-clean' && chance(0.45)){
    overlayTimers.push(setTimeout(() => {
      if(running){
        makeFilteredNoise(rand(8, 18), {
          preType:'highpass',
          preFreq:900,
          bandType:'bandpass',
          bandFreq:2200,
          bandQ:0.9,
          peak:0.04,
          attack:0.8,
          noiseLevel:0.2
        });
        log('Snap crackle burst');
      }
    }, rand(5000, 30000)));
  }
}

async function startTrack(track){
  await ensureAudio();
  updateProcessing();

  const station = activeStation();
  const memory = channelMemory[currentChannel];
const rememberedTrack = !track && memory && memory.trackSrc
  ? findTrackBySrc(currentChannel, memory.trackSrc)
  : null;

currentTrack = track || rememberedTrack || chooseTrackForChannel();
  updateTelemetry();

  if(station.mode === 'dead-air'){
    running = true;
    setLive(true);
    currentMode = 'dead air';
    els.status.textContent = '...';

    stopAllFX();
    startValveRadioStartup();

    makeFilteredNoise(rand(16, 36), {
      preType:'highpass',
      preFreq:280,
      bandType:'bandpass',
      bandFreq:610,
      bandQ:0.42,
      peak:0.08,
      attack:2,
      noiseLevel:0.32
    });
    makeHumCluster(rand(12, 26), 0.03);
    makeAmbientWash(rand(18, 38));

    crackleLoop();
    scheduleTrackIncidents();
    updateTelemetry();
    log('Dead-air channel active');

    gapTimer = setTimeout(() => {
      if(running) startTrack();
    }, rand(12000, 30000));
    return;
  }

  if(!currentTrack){
    els.status.textContent = 'No tracks in this channel';
    log('No track available for this channel');
    return;
  }

  currentMode = 'loading';
  updateTelemetry();
  els.status.textContent = `Loading ${currentTrack.title}`;

  stopAllFX();
  startValveRadioStartup();

  els.music.src = currentTrack.src;
  els.music.load();
  log(`Loading ${currentTrack.title}`);

  const activeMemory =
    channelMemory[currentChannel] &&
    channelMemory[currentChannel].trackSrc === currentTrack.src
      ? channelMemory[currentChannel]
      : null;

  const timeAway = activeMemory && activeMemory.leftAt
    ? (Date.now() - activeMemory.leftAt) / 1000
    : 0;

  const rememberedTime = activeMemory
    ? activeMemory.time + timeAway
    : 0;
  
try{
  await new Promise((resolve, reject) => {
    const onLoaded = () => {
      els.music.removeEventListener('loadedmetadata', onLoaded);
      els.music.removeEventListener('error', onError);

      try{
        if(Number.isFinite(els.music.duration) && rememberedTime > 0){
          if(rememberedTime < els.music.duration - 0.25){
            els.music.currentTime = rememberedTime;
            log(`Returned to channel ${currentChannel} at ${formatTime(rememberedTime)}`);
          } else {
            log(`Saved position passed track end on channel ${currentChannel}; starting fresh`);
          }
        }
      }catch(e){}

      resolve();
    };

    const onError = () => {
      els.music.removeEventListener('loadedmetadata', onLoaded);
      els.music.removeEventListener('error', onError);
      reject(new Error('metadata load failed'));
    };

    els.music.addEventListener('loadedmetadata', onLoaded, { once:true });
    els.music.addEventListener('error', onError, { once:true });
  });

  const playPromise = els.music.play();
  if(playPromise && typeof playPromise.then === 'function'){
    await playPromise;
  }
} catch(err){
  log(`Main track failed: ${currentTrack.title} / ${err.message || err}`);
  setTimeout(() => {
    if(running) startTrack();
  }, 500);
  return;
}

  running = true;
  setLive(true);

  const stationFade = station.mode === 'all-clean' ? rand(1.8, 4) : rand(5, 14);
  fadeGain(mainGain, 1, stationFade);

  overlayTimers.push(setTimeout(() => {
    currentMode =
      station.mode === 'textures-only' ? 'texture transmission' :
      station.mode === 'centrepieces-only' ? 'centrepiece transmission' :
      station.mode === 'all-clean' ? 'clean transmission' :
      'main broadcast';

    els.status.textContent = currentTrack.title;
    updateTelemetry();
  }, rand(2200, 7000)));

  crackleLoop();
  scheduleTrackIncidents();
  updateTelemetry();
  log(`Broadcast: ${currentTrack.title}`);
}

function beginGap(){
  if(!running) return;

  const station = activeStation();
  currentMode = station.mode === 'all-clean' ? 'handover' : 'gap';
  els.status.textContent = station.mode === 'dead-air' ? 'Audible Dead Air' : 'Tuning';
  updateTelemetry();

  fadeGain(mainGain, 0, station.mode === 'all-clean' ? rand(1.2, 2.4) : rand(2, 5));

  if(station.mode !== 'all-clean'){
    makeFilteredNoise(rand(12, 28), {
      preType:'highpass',
      preFreq:420,
      bandType:'bandpass',
      bandFreq:820,
      bandQ:0.55,
      peak:0.08,
      attack:1.4,
      noiseLevel:0.27
    });

    makeHumCluster(rand(8, 18), 0.022);
  }

  if(station.mode === 'main' || station.mode === 'textures-only'){
    playTextureSnippet('gap');
  }

  if(station.mode !== 'all-clean' && chance(0.35 + ambienceBias() * 0.3)){
    overlayTimers.push(setTimeout(() => {
      if(running) makeAmbientWash(rand(10, 24));
    }, rand(1500, 7000)));
  }

  if((station.mode === 'main' || station.mode === 'centrepieces-only') && chance(0.45 + instability() * 0.2)){
    overlayTimers.push(setTimeout(() => {
      if(running) reverseGhostLayer();
    }, rand(2500, 9000)));
  }

  const wait = station.mode === 'all-clean'
    ? rand(1200, 3500)
    : rand(5000, 18000) + instability() * 12000;

  gapTimer = setTimeout(() => {
    if(running) startTrack();
  }, wait);

  log('Gap / tuning interval');
}

function stopPlayback(keepMemory = false){
  if(keepMemory){
    saveCurrentChannelState();
  }

  running = false;
  currentMode = 'idle';
  clearTimers();

  try{ els.music.pause(); }catch(e){}
  try{ els.texture.pause(); }catch(e){}

  if(audioCtx){
    fadeGain(mainGain, 0, 0.35);
    fadeGain(textureGain, 0, 0.35);
    fadeGain(noiseGain, 0, 0.35);
    fadeGain(humGain, 0, 0.35);
  }

  stopAllFX();
  setLive(false);
  els.status.textContent = 'Stopped';
  currentTrack = null;
  currentTexture = null;
  updateTelemetry();
  log('Stopped');
}

function clearVisibleLog(){
  fullLog.push(`[${String(++logSeq).padStart(5,'0')} ${new Date().toLocaleTimeString()}] --- visible log cleared marker ---`);
  renderVisibleLog();
}

els.music.addEventListener('ended', () => {
  if(currentChannel !== 5){
    channelMemory[currentChannel] = { trackSrc:null, time:0, title:null, leftAt:0 };
  }
  if(!running) return;
  beginGap();
});

els.music.addEventListener('error', () => {
  log(`Main audio error on ${currentTrack ? currentTrack.title : 'unknown track'}`);
  if(running){
    startTrack();
  }
});

els.startBtn.addEventListener('click', async () => {
  if(running) return;
  if(!sessionStart) sessionStart = Date.now();
  channelStart = Date.now();
  await startTrack();
});

els.stopBtn.addEventListener('click', () => {
  stopPlayback();
});

els.clearBtn.addEventListener('click', () => {
  clearVisibleLog();
});

els.channelButtons.forEach((btn, idx) => {
  btn.addEventListener('click', async () => {
    const channel = idx + 1;
    if(!CHANNELS[channel].enabled){
      log(`${CHANNELS[channel].name} not wired yet`);
      return;
    }

  const wasRunning = running;
    stopPlayback(true);
    setChannel(channel);

    if(wasRunning){
      if(!sessionStart) sessionStart = Date.now();
      channelStart = Date.now();
      await startTrack();
    }
  });
});

window.addEventListener('keydown', e => {
  if(e.key === '\\' && running && Number.isFinite(els.music.duration)){
    try{
      els.music.currentTime = Math.min((els.music.duration || 0) - 0.5, els.music.currentTime + 15);
      log('Skip +15 seconds');
    }catch(err){}
  }

  if(e.key === '}'){
    e.preventDefault();
    downloadLog();
  }
});

updateClock();
setInterval(() => {
  updateClock();
  updateTelemetry();

  if(running){
    updateProcessing();
  }

  heartbeatCounter += 1;
  const station = activeStation();
  log(
    `tick | ch ${currentChannel} ${station.mode} | mode ${currentMode} | main ${currentTrack ? currentTrack.title : '—'} | tex ${currentTexture ? currentTexture.title : '—'} | inst ${instability().toFixed(2)} | amb ${ambienceBias().toFixed(2)}`
  );
}, 1000);

setChannel(1);
setLive(false);
els.status.textContent = 'Stopped';
updateTelemetry();
log('radio debug ready');
</script>
