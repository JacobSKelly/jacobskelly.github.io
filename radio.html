<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio</title>
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: rgba(255,255,255,0.6);
      --line: rgba(255,255,255,0.15);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0.01em;
    }

    .wrap {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .radio {
      width: min(820px, 100%);
      border: 1px solid var(--line);
      padding: 28px;
      background: #000;
    }

    .eyebrow {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    h1 {
      font-size: clamp(34px, 8vw, 72px);
      line-height: 0.95;
      margin: 0 0 24px;
      font-weight: 400;
      text-transform: lowercase;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 16px 0;
      margin-bottom: 22px;
    }

    .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .value {
      font-size: 16px;
      word-break: break-word;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      margin-bottom: 16px;
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    button {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--line);
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover { border-color: rgba(255,255,255,0.35); }

    .small {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .log {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      font-size: 13px;
      color: var(--muted);
      min-height: 20px;
    }

    @media (max-width: 640px) {
      .meta { grid-template-columns: 1fr; }
      .radio { padding: 20px; }
    }
  </style>
</head>
<body>

    <section class="radio">
      <div class="eyebrow">synchronised transmission</div>
      <h1>radio</h1>
