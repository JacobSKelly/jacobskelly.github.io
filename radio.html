<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>radio debug</title>

<style>
:root{
  --bg:#000;
  --fg:#fff;
  --muted:rgba(255,255,255,.62);
  --line:rgba(255,255,255,.14);
  --green:#86ff8a;
}
*{box-sizing:border-box}

html,body{
  width:100%;
  height:100%;
  margin:0;
  overflow:hidden;
  background:var(--bg);
  color:var(--fg);
  font-family:Arial,Helvetica,sans-serif;
}

.page-title{
  position:fixed;
  top:18px;
  left:24px;
  font-size:14px;
  letter-spacing:.16em;
  text-transform:lowercase;
  color:rgba(255,255,255,.7);
}

.wrap{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.radio{
  width:min(980px, calc(100vw - 48px));
  border:1px solid var(--line);
  padding:22px;
  display:grid;
  gap:18px;
}

.top{
  display:flex;
  justify-content:space-between;
}

.clock{
  font-family:monospace;
  font-size:30px;
  color:var(--green);
}

.dot{
  width:10px;height:10px;border-radius:50%;
  background:#320000;
}
.dot.on{
  background:#ff2a2a;
  box-shadow:0 0 10px red;
}

.channels{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
}

button{
  background:transparent;
  color:var(--fg);
  border:1px solid var(--line);
  padding:10px;
  cursor:pointer;
}
button.active{
  border-color:var(--green);
  color:var(--green);
}

.screen{
  border:1px solid var(--line);
  padding:12px;
}

.log{
  font-size:12px;
  height:90px;
  overflow:hidden;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="page-title">radio</div>

<div class="wrap">
<div class="radio">

<div class="top">
  <div></div>
  <div>
    <div id="clock">00:00</div>
    <div style="display:flex;gap:6px;font-size:12px">
      <div class="dot" id="dot"></div>
      <div id="liveText">standby</div>
    </div>
  </div>
</div>

<div class="channels">
<button id="ch1Btn" class="active">Channel 1</button>
<button id="ch2Btn">Channel 2</button>
<button id="ch3Btn">Channel 3</button>
<button id="ch4Btn">Channel 4</button>
<button id="ch5Btn">Channel 5</button>
</div>

<div class="screen">
<div id="status">Stopped</div>
</div>

<div>
<button id="startBtn">Start</button>
<button id="stopBtn">Stop</button>
<button id="clearBtn">Clear Log</button>
</div>

<div class="log" id="log"></div>

</div>
</div>

<audio id="music"></audio>

<script>
const TRACKS = [
{title:'Banhus',src:'https://peachradio.s3.eu-west-2.amazonaws.com/banhus.mp3'},
{title:'Redhouse',src:'https://peachradio.s3.eu-west-2.amazonaws.com/redhouse.mp3'},
{title:'Slimedemo',src:'https://peachradio.s3.eu-west-2.amazonaws.com/slimedemo.mp3'},
{title:'Funeral March',src:'https://peachradio.s3.eu-west-2.amazonaws.com/funeral+march.mp3'},
{title:'Bigblackpearl',src:'https://peachradio.s3.eu-west-2.amazonaws.com/bigblackpearl.mp3'}
];

const music = document.getElementById('music');
const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
const dot = document.getElementById('dot');
const liveText = document.getElementById('liveText');

let running=false;

function log(msg){
  const t=new Date().toLocaleTimeString();
  logEl.textContent+=`[${t}] ${msg}\n`;
  const lines=logEl.textContent.split('\n');
  if(lines.length>6){
    logEl.textContent=lines.slice(-6).join('\n');
  }
}

function playRandom(){
  const t=TRACKS[Math.floor(Math.random()*TRACKS.length)];
  music.src=t.src;
  music.play();
  statusEl.textContent=t.title;
  log('playing '+t.title);
}

document.getElementById('startBtn').onclick=()=>{
  if(running) return;
  running=true;
  dot.classList.add('on');
  liveText.textContent='live';
  playRandom();
};

document.getElementById('stopBtn').onclick=()=>{
  running=false;
  music.pause();
  statusEl.textContent='Stopped';
  dot.classList.remove('on');
  liveText.textContent='standby';
  log('stopped');
};

document.getElementById('clearBtn').onclick=()=>{
  logEl.textContent='';
};

music.onended=()=>{
  if(running) playRandom();
};

setInterval(()=>{
  const d=new Date();
  document.getElementById('clock').textContent=
    String(d.getHours()).padStart(2,'0')+':'+
    String(d.getMinutes()).padStart(2,'0');
},1000);

window.addEventListener('keydown',e=>{
  if(e.key==='\\' && running){
    music.currentTime+=10;
    log('skip');
  }
});

log('radio ready');
</script>

</body>
</html>
