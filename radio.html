<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>radio</title>
  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.62);
      --line:rgba(255,255,255,.14);
      --green:#86ff8a;
      --red:#ff2a2a;
    }

    *{box-sizing:border-box}

    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      background:var(--bg);
      color:var(--fg);
      font-family:Arial,Helvetica,sans-serif;
    }

    .page-title{
      position:fixed;
      top:16px;
      left:50%;
      transform:translateX(-50%);
      z-index:3;
      color:#fff;
      font-size:clamp(24px,4vw,42px);
      letter-spacing:.08em;
      text-transform:lowercase;
      font-weight:700;
      user-select:none;
      pointer-events:none;
    }

    .wrap{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:72px 24px 24px;
      overflow:hidden;
    }

    .radio{
      width:min(1080px, calc(100vw - 48px));
      max-width:1080px;
      border:1px solid var(--line);
      background:#000;
      padding:22px;
      display:grid;
      gap:18px;
      max-height:calc(100vh - 96px);
      overflow:hidden;
      box-shadow:0 0 0 1px rgba(255,255,255,.03) inset;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex:0 0 auto;
    }

    .live{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:11px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.15em;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#320000;
      transition:.2s;
    }

    .dot.on{
      background:var(--red);
      box-shadow:0 0 12px rgba(255,0,0,.7);
    }

    .clock{
      display:flex;
      align-items:center;
      gap:8px;
      user-select:none;
      min-height:64px;
      padding:0;
      border:none;
      background:none;
      box-shadow:none;
      flex:0 0 auto;
    }

    .clock .digit{
      position:relative;
      width:30px;
      height:52px;
      filter:
        drop-shadow(0 0 6px rgba(134,255,138,.3))
        drop-shadow(0 0 18px rgba(134,255,138,.14));
    }

    .clock .colon{
      position:relative;
      width:10px;
      height:52px;
      margin:0 2px;
    }

    .clock .colon::before,
    .clock .colon::after{
      content:"";
      position:absolute;
      left:1px;
      width:8px;
      height:8px;
      border-radius:50%;
      background:rgba(134,255,138,.92);
      box-shadow:
        0 0 10px rgba(134,255,138,.45),
        0 0 22px rgba(134,255,138,.18);
    }

    .clock .colon::before{ top:12px; }
    .clock .colon::after{ bottom:12px; }

    .seg{
      position:absolute;
      background:rgba(134,255,138,.08);
      transition:background .12s ease, box-shadow .12s ease, opacity .12s ease;
      opacity:.2;
    }

    .seg.on{
      background:rgba(134,255,138,.96);
      opacity:1;
      box-shadow:
        0 0 10px rgba(134,255,138,.55),
        0 0 22px rgba(134,255,138,.2);
    }

    .seg.a,.seg.d,.seg.g{
      left:7px;
      width:16px;
      height:5px;
      clip-path:polygon(12% 0,88% 0,100% 50%,88% 100%,12% 100%,0 50%);
    }
    .seg.a{ top:0; }
    .seg.g{ top:23px; }
    .seg.d{ bottom:0; }

    .seg.b,.seg.c,.seg.e,.seg.f{
      width:5px;
      height:18px;
      clip-path:polygon(0 12%,50% 0,100% 12%,100% 88%,50% 100%,0 88%);
    }
    .seg.f{ left:0; top:3px; }
    .seg.b{ right:0; top:3px; }
    .seg.e{ left:0; bottom:3px; }
    .seg.c{ right:0; bottom:3px; }

    .channels{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:8px;
      flex:0 0 auto;
    }

    .channels button{
      min-width:0;
    }

    .channels button.active{
      border-color:var(--green);
      color:var(--green);
      box-shadow:inset 0 0 0 1px rgba(134,255,138,.1), 0 0 14px rgba(134,255,138,.05);
    }

    .screen{
      border:1px solid var(--line);
      padding:16px;
      display:grid;
      gap:14px;
      min-height:185px;
      align-content:start;
      flex:0 0 auto;
    }

    .stateRow{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
    }

    .stateBlock{
      min-width:0;
      flex:1 1 auto;
    }

    .label{
      font-size:11px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.14em;
      margin-bottom:6px;
    }

    .value{
      font-size:clamp(20px,3vw,30px);
      word-break:break-word;
      line-height:1.2;
      min-height:1.2em;
    }

    .fineTuneBtn{
      flex:0 0 auto;
      min-width:116px;
      text-transform:lowercase;
      letter-spacing:.03em;
    }

    .fineTuneBtn.active{
      border-color:var(--green);
      color:var(--green);
      box-shadow:
        inset 0 0 0 1px rgba(134,255,138,.1),
        0 0 14px rgba(134,255,138,.06);
    }

    .telemetry{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px 20px;
      font-family:monospace;
      font-size:12px;
      color:var(--muted);
      border-top:1px solid var(--line);
      padding-top:12px;
    }

    .telemetry div{
      white-space:pre-wrap;
      word-break:break-word;
      min-height:7.1em;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      flex:0 0 auto;
      align-items:center;
    }

    button{
      background:transparent;
      color:var(--fg);
      border:1px solid var(--line);
      padding:10px 14px;
      cursor:pointer;
      font-size:14px;
    }

    button:hover{
      border-color:#fff;
    }

    .log{
      border-top:1px solid var(--line);
      padding-top:12px;
      font-size:12px;
      color:var(--muted);
      line-height:1.38;
      height:6.9em;
      overflow:hidden;
      white-space:pre-wrap;
      flex:0 0 auto;
      font-family:monospace;
    }

    @media(max-width:820px){
      html,body{
        height:auto;
        min-height:100%;
        overflow:auto;
      }

      .wrap{
        position:relative;
        inset:auto;
        min-height:100vh;
        align-items:flex-start;
        justify-content:center;
        padding:72px 16px 24px;
        overflow:visible;
      }

      .radio{
        width:100%;
        max-width:none;
        max-height:none;
        overflow:visible;
        padding:16px;
        gap:14px;
      }

      .top{
        display:flex;
        justify-content:space-between;
        align-items:flex-start;
        gap:12px;
      }

      .clock{
        min-height:56px;
        padding:0;
        gap:6px;
      }

      .clock .digit{
        width:24px;
        height:42px;
      }

      .clock .colon{
        height:42px;
      }

      .clock .colon::before,
      .clock .colon::after{
        width:6px;
        height:6px;
      }

      .clock .colon::before{ top:10px; }
      .clock .colon::after{ bottom:10px; }

      .seg.a,.seg.d,.seg.g{
        left:5px;
        width:14px;
        height:4px;
      }

      .seg.g{ top:19px; }

      .seg.b,.seg.c,.seg.e,.seg.f{
        width:4px;
        height:14px;
      }

      .seg.f{ top:3px; }
      .seg.b{ top:3px; }
      .seg.e{ bottom:3px; }
      .seg.c{ bottom:3px; }

      .channels{
        grid-template-columns:repeat(3,minmax(0,1fr));
      }

      .channels button:last-child{
        grid-column:2;
      }

      .telemetry{
        grid-template-columns:1fr;
      }

      .telemetry div{
        min-height:auto;
      }

      .actions{
        display:grid;
        grid-template-columns:repeat(3,minmax(0,1fr));
        gap:8px;
      }

      .actions button{
        width:100%;
        min-width:0;
      }

      .screen{
        min-height:0;
      }

      .log{
        height:8.2em;
      }

      .stateRow{
        gap:10px;
      }

      .fineTuneBtn{
        min-width:96px;
        padding:10px 12px;
        font-size:13px;
      }
    }
  </style>
</head>
<body>
<div class="page-title">radio</div>

<div class="wrap">
  <div class="radio">
    <div class="top">
      <div class="clock" id="clock" aria-label="clock"></div>

      <div class="live">
        <div class="dot" id="dot"></div>
        <div id="liveText">standby</div>
      </div>
    </div>

    <div class="channels">
      <button class="active" id="ch1Btn" type="button">Channel 1</button>
      <button id="ch2Btn" type="button">Channel 2</button>
      <button id="ch3Btn" type="button">Channel 3</button>
      <button id="ch4Btn" type="button">Channel 4</button>
      <button id="ch5Btn" type="button">Channel 5</button>
    </div>

    <div class="screen">
      <div class="stateRow">
        <div class="stateBlock">
          <div class="label">State</div>
          <div class="value" id="status">Stopped</div>
        </div>

        <button id="fineTuneBtn" class="fineTuneBtn" type="button">Fine Tune</button>
      </div>

      <div class="telemetry">
        <div id="telemetryLeft">ENG: offline
CH: 1
MODE: idle
AUDIO: standby
ELAPSED: 0:00
CHAN ELAPSED: 0:00</div>
        <div id="telemetryRight">MAIN: —
TEX: —
INST: 0.00
AMB: 0.00
FX: —</div>
      </div>
    </div>

    <div class="actions">
      <button id="startBtn" type="button">Start</button>
      <button id="stopBtn" type="button">Stop</button>
      <button id="clearBtn" type="button">Clear Log</button>
    </div>

    <div class="log" id="log"></div>
  </div>
</div>

<audio id="music" crossorigin="anonymous" preload="auto"></audio>
<audio id="texture" crossorigin="anonymous" preload="auto"></audio>

const stationStates = {};

function log(message){
  const stamp = new Date().toLocaleTimeString();
  const line = `[${String(++logSeq).padStart(5,'0')} ${stamp}] ${message}`;
  fullLog.push(line);
  if(fullLog.length > 300) fullLog = fullLog.slice(-300);
  renderVisibleLog();
  console.log(message);
}

function renderVisibleLog(){
  const visible = fullLog.slice(-5);
  els.log.textContent = visible.join('\n');
  els.log.scrollTop = els.log.scrollHeight;
}

function rand(min, max){
  return Math.random() * (max - min) + min;
}

function chance(n){
  return Math.random() < n;
}

function clamp(v, min, max){
  return Math.max(min, Math.min(max, v));
}

function nowMs(){
  return Date.now();
}

function formatTime(sec){
  sec = Math.max(0, Math.floor(sec));
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  if(h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function elapsedSec(){
  return running ? (Date.now() - sessionStart) / 1000 : 0;
}

function channelElapsedSec(){
  return running ? (Date.now() - channelStart) / 1000 : 0;
}

function instability(){
  return clamp(elapsedSec() / (6 * 60 * 60), 0, 1.35);
}

function activeStationMeta(){
  return CHANNELS[currentChannel];
}

function currentStationState(){
  return stationStates[currentChannel];
}

function currentTrackIsFXProtected(){
  return !!(
    currentTrack &&
    FX_PROTECTED_TRACKS.has(currentTrack.src) &&
    chance(0.8)
  );
}

function getFineTuneAmount(){
  if(cleanOverride) return 0;
  if(!fineTuneUntil || nowMs() >= fineTuneUntil) return 0;

  const elapsed = nowMs() - fineTuneStartAt;
  const progress = clamp(elapsed / fineTuneDecayMs, 0, 1);
  const eased = Math.pow(1 - progress, 1.35);
  return fineTunePeak * eased;
}

function beginFineTune(){
  fineTuneStartAt = nowMs();
  fineTuneDecayMs = rand(60_000, 300_000);
  fineTuneUntil = fineTuneStartAt + fineTuneDecayMs;
  fineTunePeak = rand(0.72, 0.94);
  els.fineTuneBtn.classList.add('active');

  if(audioCtx){
    synthesizeTuningSound(rand(0.45, 0.9), 0.28);
  }

  log(`Fine tune engaged (${Math.round(fineTuneDecayMs / 1000)}s settle)`);
  updateProcessing(false);
  updateTelemetry();
}

function syncFineTuneButton(){
  els.fineTuneBtn.classList.toggle('active', getFineTuneAmount() > 0.02);
}

function syncLiveState(){
  els.dot.classList.toggle('on', running && !muted && !pausedByKey);

  if(!running){
    els.liveText.textContent = 'standby';
  } else if(pausedByKey){
    els.liveText.textContent = 'paused';
  } else if(muted){
    els.liveText.textContent = 'muted';
  } else {
    els.liveText.textContent = 'live';
  }
}

function setMuted(nextMuted, immediate = false){
  muted = !!nextMuted;

  if(audioCtx && masterGain){
    const now = audioCtx.currentTime;
    const target = muted ? 0.0001 : 0.95;

    masterGain.gain.cancelScheduledValues(now);

    if(immediate){
      masterGain.gain.setValueAtTime(target, now);
    } else {
      masterGain.gain.setValueAtTime(masterGain.gain.value, now);
      masterGain.gain.linearRampToValueAtTime(target, now + (muted ? 0.08 : 0.25));
    }
  }

  syncLiveState();
  updateTelemetry();
}

function setLive(on){
  running = !!on;
  syncLiveState();
}

function createDigit(){
  const digit = document.createElement('div');
  digit.className = 'digit';
  ['a','b','c','d','e','f','g'].forEach(name => {
    const seg = document.createElement('div');
    seg.className = `seg ${name}`;
    digit.appendChild(seg);
  });
  return digit;
}

function renderClock(text){
  els.clock.innerHTML = '';
  for(const ch of text){
    if(ch === ':'){
      const colon = document.createElement('div');
      colon.className = 'colon';
      els.clock.appendChild(colon);
      continue;
    }
    const digit = createDigit();
    const active = DIGIT_MAP[ch] || [];
    active.forEach(name => {
      const seg = digit.querySelector(`.${name}`);
      if(seg) seg.classList.add('on');
    });
    els.clock.appendChild(digit);
  }
}

function updateClock(){
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  renderClock(`${hh}:${mm}`);
}

function setStatusTuning(){
  els.status.textContent = 'Tuning';
}

function stationPhaseLabel(station){
  if(!station) return 'idle';
  if(station.phase === 'track') return station.mode === 'all-clean' ? 'clean transmission' : 'broadcast';
  if(station.phase === 'dead-air') return 'dead air';
  if(station.phase === 'tuning') return 'tuning';
  return 'idle';
}

function updateTelemetry(){
  const ctxState = audioCtx ? audioCtx.state : 'none';
  const station = currentStationState();
  const stationTrack = station && station.phase === 'track' && station.currentTrack ? station.currentTrack.title : '—';
  const fine = getFineTuneAmount();

  const fxText = audioCtx
    ? `m ${mainGain ? mainGain.gain.value.toFixed(2) : '0.00'} / t ${textureGain ? textureGain.gain.value.toFixed(2) : '0.00'} / n ${noiseGain ? noiseGain.gain.value.toFixed(2) : '0.00'} / a ${ambientGain ? ambientGain.gain.value.toFixed(2) : '0.00'}${cleanOverride ? ' / clean' : fine > 0.02 ? ` / ft ${fine.toFixed(2)}` : ''}`
    : '—';

  els.telemetryLeft.textContent =
`ENG: ${ctxState}
CH: ${currentChannel}
MODE: ${currentMode}
AUDIO: ${running ? (pausedByKey ? 'paused' : (muted ? 'muted' : 'live')) : 'standby'}
ELAPSED: ${formatTime(elapsedSec())}
CHAN ELAPSED: ${formatTime(channelElapsedSec())}`;

  els.telemetryRight.textContent =
`MAIN: ${currentTrack ? currentTrack.title : stationTrack}
TEX: ${currentTexture ? currentTexture.title : '—'}
INST: ${instability().toFixed(2)}
AMB: ${station ? station.ambience.toFixed(2) : '0.00'}
FX: ${fxText}`;

  syncFineTuneButton();
}

function shuffle(array){
  const copy = array.slice();
  for(let i = copy.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function makeDistortionCurve(amount = 0){
  const samples = 44100;
  const curve = new Float32Array(samples);
  const k = Math.max(0, amount);

  for(let i = 0; i < samples; i++){
    const x = i * 2 / samples - 1;
    curve[i] = ((3 + k) * x * 20 * Math.PI / 180) / (Math.PI + k * Math.abs(x));
  }

  return curve;
}

async function ensureAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    mainSource = audioCtx.createMediaElementSource(els.music);
    textureSource = audioCtx.createMediaElementSource(els.texture);

    masterGain = audioCtx.createGain();
    mainGain = audioCtx.createGain();
    textureGain = audioCtx.createGain();
    noiseGain = audioCtx.createGain();
    humGain = audioCtx.createGain();
    ambientGain = audioCtx.createGain();

    mainDrive = audioCtx.createWaveShaper();
    mainDrive.curve = makeDistortionCurve(0);
    mainDrive.oversample = '2x';

    mainFilter = audioCtx.createBiquadFilter();
    mainFilter.type = 'lowpass';
    mainFilter.frequency.value = 18000;

    textureDrive = audioCtx.createWaveShaper();
    textureDrive.curve = makeDistortionCurve(60);
    textureDrive.oversample = '2x';

    textureFilter = audioCtx.createBiquadFilter();
    textureFilter.type = 'bandpass';
    textureFilter.frequency.value = 1200;
    textureFilter.Q.value = 1.0;

    mainSend = audioCtx.createGain();
    mainDelay = audioCtx.createDelay(4.0);
    mainFeedback = audioCtx.createGain();
    mainWet = audioCtx.createGain();

    ambientLP = audioCtx.createBiquadFilter();
    ambientLP.type = 'lowpass';
    ambientLP.frequency.value = 2400;

    ambientDelay = audioCtx.createDelay(8.0);
    ambientFeedback = audioCtx.createGain();
    ambientWet = audioCtx.createGain();

    masterGain.gain.value = 0.95;
    mainGain.gain.value = 0;
    textureGain.gain.value = 0;
    noiseGain.gain.value = 0;
    humGain.gain.value = 0;
    ambientGain.gain.value = 1;

    mainSend.gain.value = 0.10;
    mainDelay.delayTime.value = 0.22;
    mainFeedback.gain.value = 0.24;
    mainWet.gain.value = 0.18;

    ambientDelay.delayTime.value = 1.8;
    ambientFeedback.gain.value = 0.55;
    ambientWet.gain.value = 0.14;

    mainSource.connect(mainDrive);
    mainDrive.connect(mainFilter);
    mainFilter.connect(mainGain);
    mainGain.connect(masterGain);

    textureSource.connect(textureDrive);
    textureDrive.connect(textureFilter);
    textureFilter.connect(textureGain);
    textureGain.connect(masterGain);

    mainFilter.connect(mainSend);
    mainSend.connect(mainDelay);
    mainDelay.connect(mainWet);
    mainWet.connect(masterGain);
    mainDelay.connect(mainFeedback);
    mainFeedback.connect(mainDelay);

    mainFilter.connect(ambientLP);
    ambientLP.connect(ambientDelay);
    ambientDelay.connect(ambientWet);
    ambientWet.connect(ambientGain);
    ambientGain.connect(masterGain);
    ambientDelay.connect(ambientFeedback);
    ambientFeedback.connect(ambientDelay);

    noiseGain.connect(masterGain);
    humGain.connect(masterGain);
    masterGain.connect(audioCtx.destination);

    log(`AudioContext created (${audioCtx.state})`);
  }

  if(audioCtx.state === 'suspended'){
    await audioCtx.resume();
    log(`AudioContext resumed (${audioCtx.state})`);
  }

  updateTelemetry();
}

function fadeGain(gainNode, target, seconds){
  if(!audioCtx || !gainNode) return;
  const now = audioCtx.currentTime;
  gainNode.gain.cancelScheduledValues(now);
  gainNode.gain.setValueAtTime(gainNode.gain.value, now);
  gainNode.gain.linearRampToValueAtTime(target, now + seconds);
}

function clearOverlayTimers(){
  overlayTimers.forEach(id => clearTimeout(id));
  overlayTimers = [];
}

function clearSelectedTimers(){
  if(selectedStationTimer){
    clearTimeout(selectedStationTimer);
    selectedStationTimer = null;
  }
  if(selectedFadeTimer){
    clearTimeout(selectedFadeTimer);
    selectedFadeTimer = null;
  }
}

function stopOneShotNodes(){
  activeNodeStops.forEach(fn => {
    try{ fn(); }catch(e){}
  });
  activeNodeStops = [];
}

function stopAllFX(){
  clearOverlayTimers();
  stopOneShotNodes();

  try{ els.texture.pause(); }catch(e){}
  els.texture.removeAttribute('src');
  els.texture.load();

  if(audioCtx){
    fadeGain(textureGain, 0, 0.15);
    fadeGain(noiseGain, 0, 0.15);
    fadeGain(humGain, 0, 0.15);
  }

  currentTexture = null;
  updateTelemetry();
}

function stationAmbience(mode, station){
  const t = clamp((nowMs() - station.createdAt) / (6 * 60 * 60 * 1000), 0, 1.3);
  const tide = (Math.sin((nowMs() - station.createdAt) / 90000) + 1) * 0.5;

  if(cleanOverride) return 1;
  if(mode === 'all-clean') return clamp(0.55 + tide * 0.2, 0, 1);
  if(mode === 'dead-air') return clamp(0.6 + tide * 0.16, 0, 1);
  if(mode === 'textures-only') return clamp(0.35 + tide * 0.22 + t * 0.08, 0, 1);
  if(mode === 'centrepieces-only') return clamp(0.26 + tide * 0.18 + t * 0.07, 0, 1);
  return clamp(0.28 + tide * 0.22 + t * 0.1, 0, 1);
}

function updateProcessing(forceGhost = false){
  if(!audioCtx) return;

  const station = currentStationState();
  const meta = activeStationMeta();
  const ambient = station ? station.ambience : 0.35;
  const t = instability();
  const fine = getFineTuneAmount();

  if(cleanOverride){
    mainDrive.curve = makeDistortionCurve(0);
    textureDrive.curve = makeDistortionCurve(0);
    mainFilter.frequency.setTargetAtTime(19000, audioCtx.currentTime, 0.25);
    textureFilter.frequency.setTargetAtTime(1800, audioCtx.currentTime, 0.25);
    mainSend.gain.setTargetAtTime(0.0, audioCtx.currentTime, 0.25);
    mainDelay.delayTime.setTargetAtTime(0.12, audioCtx.currentTime, 0.25);
    mainFeedback.gain.setTargetAtTime(0.0, audioCtx.currentTime, 0.25);
    mainWet.gain.setTargetAtTime(0.0, audioCtx.currentTime, 0.25);
    ambientLP.frequency.setTargetAtTime(6000, audioCtx.currentTime, 0.25);
    ambientDelay.delayTime.setTargetAtTime(0.2, audioCtx.currentTime, 0.25);
    ambientFeedback.gain.setTargetAtTime(0.0, audioCtx.currentTime, 0.25);
    ambientWet.gain.setTargetAtTime(0.0, audioCtx.currentTime, 0.25);
    noiseGain.gain.setTargetAtTime(0.0, audioCtx.currentTime, 0.15);
    humGain.gain.setTargetAtTime(0.0, audioCtx.currentTime, 0.15);
    updateTelemetry();
    return;
  }

  if(forceGhost){
    const ghostClean = fine * 0.65;
    mainDrive.curve = makeDistortionCurve((meta.mode === 'all-clean' ? 14 : 110) * (1 - ghostClean));
    mainFilter.frequency.setTargetAtTime((meta.mode === 'all-clean' ? 2200 : 1250) + ghostClean * 5000, audioCtx.currentTime, 0.08);
    mainSend.gain.setTargetAtTime(0.01 * (1 - ghostClean), audioCtx.currentTime, 0.08);
    mainFeedback.gain.setTargetAtTime(0.08 * (1 - ghostClean), audioCtx.currentTime, 0.08);
    mainWet.gain.setTargetAtTime(0.04 * (1 - ghostClean), audioCtx.currentTime, 0.08);
    ambientWet.gain.setTargetAtTime(0.0, audioCtx.currentTime, 0.08);
    noiseGain.gain.setTargetAtTime(0.035 * (1 - fine), audioCtx.currentTime, 0.08);
    humGain.gain.setTargetAtTime(0.018 * (1 - fine), audioCtx.currentTime, 0.08);
    return;
  }

  const clean = meta.mode === 'all-clean';
  const deadAir = meta.mode === 'dead-air';
  const texturesOnly = meta.mode === 'textures-only';
  const centreOnly = meta.mode === 'centrepieces-only';

  const effectiveAmbient = clamp(ambient + fine * 0.55, 0, 1);

  let mainAmount = deadAir ? 0 : clamp((clean ? 6 : 44) + (1 - effectiveAmbient) * (clean ? 10 : 120) + t * (clean ? 4 : 50), 0, 260);
  let textureAmount = clean ? 0 : clamp(24 + (1 - effectiveAmbient) * (texturesOnly ? 160 : 100) + t * 70, 0, 280);

  mainAmount *= (1 - fine * 0.88);
  textureAmount *= (1 - fine * 0.96);

  mainDrive.curve = makeDistortionCurve(mainAmount);
  textureDrive.curve = makeDistortionCurve(textureAmount);

  const mainCut = clean
    ? 18200 - effectiveAmbient * 3600
    : deadAir
      ? 7000 - effectiveAmbient * 1800
      : 17800 - (1 - effectiveAmbient) * 8200 - t * 6000 + fine * 7000;

  const textureBand = clean ? 1650 : 650 + effectiveAmbient * 700 + Math.random() * 800 + fine * 600;

  mainFilter.frequency.setTargetAtTime(Math.max(650, mainCut), audioCtx.currentTime, 0.7);
  textureFilter.frequency.setTargetAtTime(textureBand, audioCtx.currentTime, 0.7);

  const sendBase = deadAir ? 0.03 : (clean ? 0.04 : 0.06 + (1 - effectiveAmbient) * 0.08);
  const delayBase = clean ? 0.2 : 0.16 + (1 - effectiveAmbient) * 0.18;
  const feedbackBase = clean ? 0.1 : 0.16 + (1 - effectiveAmbient) * 0.15;
  const wetBase = clean ? 0.08 : 0.12 + (1 - effectiveAmbient) * 0.08;

  mainSend.gain.setTargetAtTime(sendBase * (1 - fine * 0.94), audioCtx.currentTime, 0.6);
  mainDelay.delayTime.setTargetAtTime(Math.max(0.08, delayBase * (1 - fine * 0.4)), audioCtx.currentTime, 0.6);
  mainFeedback.gain.setTargetAtTime(feedbackBase * (1 - fine * 0.96), audioCtx.currentTime, 0.6);
  mainWet.gain.setTargetAtTime(wetBase * (1 - fine * 0.96), audioCtx.currentTime, 0.6);

  ambientLP.frequency.setTargetAtTime((clean ? 4800 : 1600 + effectiveAmbient * 2800) + fine * 2200, audioCtx.currentTime, 0.8);
  ambientDelay.delayTime.setTargetAtTime(Math.max(0.16, (deadAir ? 2.2 : 0.8 + effectiveAmbient * 3.2) * (1 - fine * 0.82)), audioCtx.currentTime, 0.8);
  ambientFeedback.gain.setTargetAtTime((clean ? 0.4 : deadAir ? 0.56 : 0.38 + effectiveAmbient * 0.28) * (1 - fine * 0.95), audioCtx.currentTime, 0.8);
  ambientWet.gain.setTargetAtTime((clean ? 0.08 : deadAir ? 0.14 : 0.1 + effectiveAmbient * 0.2) * (1 - fine * 0.95), audioCtx.currentTime, 0.8);

  noiseGain.gain.setTargetAtTime((deadAir ? 0.05 : 0.035) * (1 - fine * 0.92), audioCtx.currentTime, 0.25);
  humGain.gain.setTargetAtTime((deadAir ? 0.024 : 0.015) * (1 - fine * 0.92), audioCtx.currentTime, 0.25);

  if(texturesOnly){
    mainSend.gain.setTargetAtTime(0.02 * (1 - fine * 0.9), audioCtx.currentTime, 0.5);
  }

  if(centreOnly){
    textureGain.gain.setTargetAtTime(0.0, audioCtx.currentTime, 0.15);
  }

  updateTelemetry();
}

function makeFilteredNoise(durationSec, config = {}){
  if(!audioCtx || cleanOverride) return;

  const now = audioCtx.currentTime;
  const buffer = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * durationSec), audioCtx.sampleRate);
  const data = buffer.getChannelData(0);

  for(let i = 0; i < data.length; i++){
    data[i] = (Math.random() * 2 - 1) * (config.noiseLevel || 0.22);
  }

  const src = audioCtx.createBufferSource();
  src.buffer = buffer;

  const pre = audioCtx.createBiquadFilter();
  pre.type = config.preType || 'lowpass';
  pre.frequency.value = config.preFreq || 1200;

  const band = audioCtx.createBiquadFilter();
  band.type = config.bandType || 'bandpass';
  band.frequency.value = config.bandFreq || 900;
  band.Q.value = config.bandQ || 0.7;

  const gain = audioCtx.createGain();
  gain.gain.value = 0.0001;

  src.connect(pre);
  pre.connect(band);
  band.connect(gain);
  gain.connect(noiseGain);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(config.peak || 0.05, now + (config.attack || 0.7));
  gain.gain.exponentialRampToValueAtTime(0.0001, now + durationSec);

  src.start(now);
  src.stop(now + durationSec + 0.05);

  const stop = () => {
    try{ src.stop(); }catch(e){}
    [src, pre, band, gain].forEach(node => {
      try{ node.disconnect(); }catch(e){}
    });
  };

  activeNodeStops.push(stop);
  return stop;
}

function makeHumCluster(durationSec, peak = 0.02){
  if(!audioCtx || cleanOverride) return;

  const now = audioCtx.currentTime;
  const base = chance(0.5) ? 50 : 60;

  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const osc3 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc1.type = 'sine';
  osc2.type = 'sine';
  osc3.type = 'triangle';

  osc1.frequency.value = base;
  osc2.frequency.value = base * 2;
  osc3.frequency.value = base * 0.5;

  gain.gain.value = 0.0001;

  osc1.connect(gain);
  osc2.connect(gain);
  osc3.connect(gain);
  gain.connect(humGain);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(peak, now + 0.5);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + durationSec);

  osc1.start(now);
  osc2.start(now);
  osc3.start(now);
  osc1.stop(now + durationSec + 0.05);
  osc2.stop(now + durationSec + 0.05);
  osc3.stop(now + durationSec + 0.05);

  const stop = () => {
    try{ osc1.stop(); }catch(e){}
    try{ osc2.stop(); }catch(e){}
    try{ osc3.stop(); }catch(e){}
    [osc1, osc2, osc3, gain].forEach(node => {
      try{ node.disconnect(); }catch(e){}
    });
  };

  activeNodeStops.push(stop);
  return stop;
}

function synthesizeTuningSound(durationSec = 1.8, intensity = 0.8){
  if(!audioCtx || cleanOverride) return;

  const now = audioCtx.currentTime;
  const hissBuffer = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * durationSec), audioCtx.sampleRate);
  const hissData = hissBuffer.getChannelData(0);

  for(let i = 0; i < hissData.length; i++){
    hissData[i] = (Math.random() * 2 - 1) * 0.25 * intensity;
  }

  const hiss = audioCtx.createBufferSource();
  hiss.buffer = hissBuffer;

  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 320;

  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.setValueAtTime(rand(900, 2200), now);
  bp.frequency.exponentialRampToValueAtTime(rand(450, 2800), now + durationSec);
  bp.Q.value = 0.8;

  const hissGain = audioCtx.createGain();
  hissGain.gain.value = 0.0001;

  hiss.connect(hp);
  hp.connect(bp);
  bp.connect(hissGain);
  hissGain.connect(noiseGain);

  hissGain.gain.setValueAtTime(0.0001, now);
  hissGain.gain.exponentialRampToValueAtTime(0.05 * intensity, now + 0.08);
  hissGain.gain.exponentialRampToValueAtTime(0.0001, now + durationSec);

  const toneA = audioCtx.createOscillator();
  const toneB = audioCtx.createOscillator();
  const toneFilter = audioCtx.createBiquadFilter();
  const toneGain = audioCtx.createGain();

  toneA.type = 'sine';
  toneB.type = 'sine';
  toneA.frequency.setValueAtTime(rand(350, 900), now);
  toneB.frequency.setValueAtTime(rand(354, 908), now);
  toneA.frequency.exponentialRampToValueAtTime(rand(130, 380), now + durationSec);
  toneB.frequency.exponentialRampToValueAtTime(rand(134, 388), now + durationSec);

  toneFilter.type = 'bandpass';
  toneFilter.frequency.value = rand(950, 2100);
  toneFilter.Q.value = 2;

  toneGain.gain.value = 0.0001;

  toneA.connect(toneFilter);
  toneB.connect(toneFilter);
  toneFilter.connect(toneGain);
  toneGain.connect(noiseGain);

  toneGain.gain.setValueAtTime(0.0001, now);
  toneGain.gain.exponentialRampToValueAtTime(0.02 * intensity, now + 0.04);
  toneGain.gain.exponentialRampToValueAtTime(0.0001, now + durationSec * 0.82);

  hiss.start(now);
  hiss.stop(now + durationSec + 0.05);
  toneA.start(now);
  toneB.start(now);
  toneA.stop(now + durationSec + 0.05);
  toneB.stop(now + durationSec + 0.05);

  const stop = () => {
    try{ hiss.stop(); }catch(e){}
    try{ toneA.stop(); }catch(e){}
    try{ toneB.stop(); }catch(e){}
    [hiss, hp, bp, hissGain, toneA, toneB, toneFilter, toneGain].forEach(node => {
      try{ node.disconnect(); }catch(e){}
    });
  };

  activeNodeStops.push(stop);
}

function initStation(channel){
  const meta = CHANNELS[channel];
  const allTracks = [...meta.centrepieces, ...meta.textures];

  stationStates[channel] = {
    channel,
    name: meta.name,
    mode: meta.mode,
    createdAt: nowMs() - Math.floor(rand(0, 25 * 60 * 1000)),
    ambience: 0.3,
    phase: 'idle',
    phaseStartedAt: 0,
    phaseEndsAt: 0,
    currentTrack: null,
    preparedTrack: null,
    preparedPreviewOffset: 15,
    playOffsetAtPhaseStart: 0,
    lastTrackSrc: null,
    lastAmbulanceAt: 0,
    nextTrackStartsMidway: true,
    trackEntryMode: 'mid',
    bags: {
      centrepieces: shuffle(meta.centrepieces),
      textures: shuffle(meta.textures),
      all: shuffle(allTracks)
    }
  };
}

function refillBag(station, key){
  const meta = CHANNELS[station.channel];
  if(key === 'centrepieces') station.bags.centrepieces = shuffle(meta.centrepieces);
  if(key === 'textures') station.bags.textures = shuffle(meta.textures);
  if(key === 'all') station.bags.all = shuffle([...meta.centrepieces, ...meta.textures]);
}

function pullFromBag(station, key, excludeSrc = null){
  if(!station.bags[key] || station.bags[key].length === 0){
    refillBag(station, key);
  }

  let pool = station.bags[key];
  let idx = pool.findIndex(track => !excludeSrc || track.src !== excludeSrc);

  if(idx < 0){
    refillBag(station, key);
    pool = station.bags[key];
    idx = pool.findIndex(track => !excludeSrc || track.src !== excludeSrc);
  }

  if(idx < 0) idx = 0;
  return pool.splice(idx, 1)[0] || null;
}

function shouldPrioritizeAmbulance(station){
  if(station.channel === 5) return false;
  const t = nowMs();
  const restedGlobally = (t - globalAmbulanceLastAt) > AMBULANCE_REST_MS;
  const restedLocally = (t - station.lastAmbulanceAt) > AMBULANCE_REST_MS;
  if(!restedGlobally || !restedLocally) return false;
  return chance(station.mode === 'all-clean' ? 0.42 : 0.56);
}

function makeAmbulanceWindowTrack(){
  const playStart = rand(AMBULANCE_WINDOW_START, AMBULANCE_WINDOW_END - 130);
  return {
    title: 'Ambulance Land',
    src: AMBULANCE_SRC,
    durationHint: AMBULANCE_WINDOW_END - playStart,
    forcedWindow: true,
    windowStart: playStart,
    windowEnd: AMBULANCE_WINDOW_END
  };
}

function chooseTrackForStation(station){
  if(shouldPrioritizeAmbulance(station)){
    station.lastAmbulanceAt = nowMs();
    globalAmbulanceLastAt = nowMs();
    return makeAmbulanceWindowTrack();
  }

  let picked = null;

  if(station.mode === 'textures-only'){
    picked = pullFromBag(station, 'textures', station.lastTrackSrc);
  } else if(station.mode === 'centrepieces-only'){
    picked = pullFromBag(station, 'centrepieces', station.lastTrackSrc);
  } else if(station.mode === 'all-clean'){
    picked = pullFromBag(station, 'all', station.lastTrackSrc);
  } else if(station.mode === 'main'){
    picked = pullFromBag(station, 'centrepieces', station.lastTrackSrc);
    if(!picked && chance(0.22)){
      picked = pullFromBag(station, 'textures', station.lastTrackSrc);
    }
  }

  if(!picked && station.mode !== 'dead-air'){
    picked = pullFromBag(station, 'all', station.lastTrackSrc);
  }

  if(!picked) return null;

  if(picked.src === AMBULANCE_SRC && chance(0.5) && (nowMs() - globalAmbulanceLastAt) > 5 * 60 * 1000){
    station.lastAmbulanceAt = nowMs();
    globalAmbulanceLastAt = nowMs();
  }

  return {
    title: picked.title,
    src: picked.src
  };
}

function tuningDurationFor(station){
  if(station.mode === 'all-clean') return rand(1200, 2600);
  if(station.mode === 'dead-air') return rand(2400, 5000);
  return rand(1800, 4200);
}

function deadAirDurationFor(){
  return rand(12000, 28000);
}

function chooseRandomTrackStart(duration, station){
  if(!Number.isFinite(duration) || duration < 8) return 0;

  if(station.currentTrack && station.currentTrack.forcedWindow){
    return station.currentTrack.windowStart;
  }

  const minPct = station.mode === 'all-clean' ? 0.16 : 0.1;
  const maxPct = station.mode === 'all-clean' ? 0.82 : 0.88;
  const endBuffer = station.mode === 'all-clean' ? 15 : 10;
  const minStart = Math.max(2, duration * minPct);
  const maxStart = Math.max(minStart + 1, Math.min(duration - endBuffer, duration * maxPct));
  return maxStart > minStart ? rand(minStart, maxStart) : minStart;
}

function chooseRareShortenStart(duration){
  if(!Number.isFinite(duration) || duration < 40) return 0;
  return rand(duration * 0.04, duration * 0.22);
}

function enterTuning(station, at, preparedTrack = null){
  station.phase = 'tuning';
  station.phaseStartedAt = at;
  station.phaseEndsAt = at + tuningDurationFor(station);
  station.currentTrack = null;
  station.preparedTrack = preparedTrack;
  station.preparedPreviewOffset = preparedTrack && preparedTrack.forcedWindow
    ? preparedTrack.windowStart
    : rand(12, 90);
  station.playOffsetAtPhaseStart = 0;
  station.ambience = stationAmbience(station.mode, station);
}

function enterDeadAir(station, at){
  station.phase = 'dead-air';
  station.phaseStartedAt = at;
  station.phaseEndsAt = at + deadAirDurationFor();
  station.currentTrack = null;
  station.preparedTrack = null;
  station.playOffsetAtPhaseStart = 0;
  station.ambience = stationAmbience(station.mode, station);
}

function enterTrack(station, at){
  const picked = station.preparedTrack || chooseTrackForStation(station);
  station.preparedTrack = null;

  if(!picked){
    enterTuning(station, at);
    return;
  }

  station.currentTrack = picked;
  station.lastTrackSrc = picked.src;

  let entryMode = 'start';
  if(picked.forcedWindow){
    entryMode = 'window';
  } else if(station.nextTrackStartsMidway){
    entryMode = 'mid';
  } else if(chance(0.06)){
    entryMode = 'short';
  }

  station.trackEntryMode = entryMode;
  station.nextTrackStartsMidway = false;

  const fallbackDuration =
    picked.forcedWindow ? (picked.windowEnd - picked.windowStart) :
    entryMode === 'start' ? 300 :
    entryMode === 'short' ? 230 :
    220;

  station.phase = 'track';
  station.phaseStartedAt = at;
  station.playOffsetAtPhaseStart = entryMode === 'window' ? picked.windowStart : 0;
  station.phaseEndsAt = at + (fallbackDuration * 1000);
  station.ambience = stationAmbience(station.mode, station);
}

function retuneStationNow(station){
  const picked = station.mode === 'dead-air' ? null : chooseTrackForStation(station);
  station.nextTrackStartsMidway = true;
  enterTuning(station, nowMs(), picked);
}

function bootStation(station){
  const bootAt = station.createdAt;
  enterTuning(station, bootAt);
}

function advanceStationToNow(station, t = nowMs()){
  if(station.phase === 'idle'){
    bootStation(station);
  }

  let safety = 0;
  while(station.phaseEndsAt <= t && safety < 120){
    const edge = station.phaseEndsAt;

    if(station.mode === 'dead-air'){
      if(station.phase === 'tuning'){
        enterDeadAir(station, edge);
      } else {
        enterTuning(station, edge);
      }
    } else {
      if(station.phase === 'track'){
        enterTuning(station, edge);
      } else {
        enterTrack(station, edge);
      }
    }

    safety += 1;
  }

  station.ambience = stationAmbience(station.mode, station);
  return station;
}

async function getTrackDurationCached(src){
  return new Promise((resolve) => {
    const a = new Audio();
    a.preload = 'metadata';
    a.crossOrigin = 'anonymous';
    a.src = src;

    const done = (dur) => {
      a.removeAttribute('src');
      a.load();
      resolve(Number.isFinite(dur) ? dur : null);
    };

    a.addEventListener('loadedmetadata', () => done(a.duration), { once:true });
    a.addEventListener('error', () => done(null), { once:true });
  });
}

async function stabilizeStationDurations(station){
  if(station.phase !== 'track' || !station.currentTrack) return;

  const track = station.currentTrack;

  if(track.forcedWindow){
    station.playOffsetAtPhaseStart = track.windowStart;
    station.phaseEndsAt = station.phaseStartedAt + ((track.windowEnd - track.windowStart) * 1000);
    return;
  }

  const dur = track.fullDuration || await getTrackDurationCached(track.src);
  if(!dur) return;

  track.fullDuration = dur;

  let startOffset = 0;
  if(station.trackEntryMode === 'mid'){
    startOffset = chooseRandomTrackStart(dur, station);
  } else if(station.trackEntryMode === 'short'){
    startOffset = chooseRareShortenStart(dur);
  } else {
    startOffset = 0;
  }

  station.playOffsetAtPhaseStart = startOffset;
  station.phaseEndsAt = station.phaseStartedAt + ((dur - startOffset) * 1000);
}

function stationTrackOffsetNow(station, t = nowMs()){
  if(!station || station.phase !== 'track' || !station.currentTrack) return 0;
  const offset = station.playOffsetAtPhaseStart + ((t - station.phaseStartedAt) / 1000);
  return Math.max(0, offset);
}

async function prepareTrackPlayback(track, offset){
  return new Promise((resolve, reject) => {
    const currentSrc = els.music.currentSrc || els.music.src || '';
    const srcChanged = currentSrc !== track.src;

    const onError = () => {
      els.music.removeEventListener('loadedmetadata', onMeta);
      els.music.removeEventListener('error', onError);
      reject(new Error('metadata load failed'));
    };

    const onMeta = async () => {
      try{
        const maxOffset = Number.isFinite(els.music.duration) ? Math.max(0, els.music.duration - 0.35) : offset;
        els.music.currentTime = Math.min(offset, maxOffset);
        resolve();
      } catch(err){
        reject(err);
      } finally {
        els.music.removeEventListener('loadedmetadata', onMeta);
        els.music.removeEventListener('error', onError);
      }
    };

    if(srcChanged){
      els.music.pause();
      els.music.src = track.src;
      els.music.load();
      els.music.addEventListener('loadedmetadata', onMeta, { once:true });
      els.music.addEventListener('error', onError, { once:true });
    } else {
      try{
        if(Number.isFinite(els.music.duration)){
          const maxOffset = Math.max(0, els.music.duration - 0.35);
          els.music.currentTime = Math.min(offset, maxOffset);
          resolve();
        } else {
          els.music.addEventListener('loadedmetadata', onMeta, { once:true });
          els.music.addEventListener('error', onError, { once:true });
        }
      } catch(err){
        reject(err);
      }
    }
  });
}

function playTuningBurstFor(meta){
  if(meta.mode === 'all-clean'){
    synthesizeTuningSound(rand(0.8, 1.4), 0.35);
  } else if(meta.mode === 'dead-air'){
    synthesizeTuningSound(rand(1.2, 2.2), 0.85);
    makeFilteredNoise(rand(1.6, 2.8), {
      preType:'highpass',
      preFreq:340,
      bandType:'bandpass',
      bandFreq:900,
      bandQ:0.6,
      peak:0.05,
      attack:0.18,
      noiseLevel:0.2
    });
    makeHumCluster(rand(1.8, 3.2), 0.012);
  } else {
    synthesizeTuningSound(rand(1.0, 1.8), 0.7);
    makeFilteredNoise(rand(1.2, 2.4), {
      preType:'highpass',
      preFreq:580,
      bandType:'bandpass',
      bandFreq:1100,
      bandQ:0.7,
      peak:0.04,
      attack:0.12,
      noiseLevel:0.18
    });
  }
}

function scheduleSelectedStationRefresh(delayMs){
  clearSelectedTimers();
  selectedStationTimer = setTimeout(() => {
    if(!running || pausedByKey) return;
    renderSelectedStation(false);
  }, Math.max(30, delayMs));
}

function scheduleAmbulanceFadeIfNeeded(station){
  if(!audioCtx || !station || station.phase !== 'track' || !station.currentTrack) return;
  if(!station.currentTrack.forcedWindow) return;

  clearTimeout(selectedFadeTimer);

  const remainingSec = (station.phaseEndsAt - nowMs()) / 1000;
  if(remainingSec <= 0) return;

  const msToFade = Math.max(0, (remainingSec - AMBULANCE_WINDOW_FADE) * 1000);

  selectedFadeTimer = setTimeout(() => {
    if(!running || currentChannel !== station.channel || !station.currentTrack || !station.currentTrack.forcedWindow) return;
    fadeGain(mainGain, 0.0001, Math.min(AMBULANCE_WINDOW_FADE, remainingSec));
    log('Ambulance Land slow fade');
  }, msToFade);
}

async function playGhostSignal(track, offset, meta){
  if(!track || !audioCtx) return;

  try{
    await prepareTrackPlayback(track, offset);
    updateProcessing(true);

    currentTrack = null;
    currentMode = 'tuning';
    setStatusTuning();

    fadeGain(mainGain, meta.mode === 'all-clean' ? 0.08 : 0.06, 0.12);
    await els.music.play().catch(() => {});
  } catch(err){
    log(`Ghost signal skip: ${err.message || err}`);
  }
}

async function renderSelectedStation(fromRetune = false){
  const station = advanceStationToNow(currentStationState());
  const meta = CHANNELS[currentChannel];
  currentMode = stationPhaseLabel(station);

  if(station.phase === 'track' && station.currentTrack){
    await stabilizeStationDurations(station);
    const actualOffset = stationTrackOffsetNow(station);

    try{
      await prepareTrackPlayback(station.currentTrack, actualOffset);
      currentTrack = station.currentTrack;
      updateProcessing(false);

      fadeGain(mainGain, 1, fromRetune ? 0.7 : 0.35);
      await els.music.play().catch(() => {});
      els.status.textContent = station.currentTrack.title;
      currentMode = meta.mode === 'all-clean' ? 'clean transmission' : 'broadcast';
      scheduleAmbulanceFadeIfNeeded(station);
      scheduleSelectedStationRefresh(station.phaseEndsAt - nowMs() + 40);
      log(`Locked to ${meta.name} / ${station.currentTrack.title} @ ${formatTime(actualOffset)}`);
    } catch(err){
      setStatusTuning();
      log(`Playback fail on ${meta.name}: ${err.message || err}`);
      scheduleSelectedStationRefresh(900);
    }
  } else {
    currentTrack = null;

    if(station.phase === 'tuning' && station.preparedTrack){
      await playGhostSignal(station.preparedTrack, station.preparedPreviewOffset, meta);
    } else {
      try{ els.music.pause(); }catch(e){}
      fadeGain(mainGain, 0.0001, 0.14);
    }

    setStatusTuning();
    scheduleSelectedStationRefresh(station.phaseEndsAt - nowMs() + 40);
    log(`Listening to ${meta.name} / ${station.phase}`);
  }

  updateTelemetry();
}

async function tuneToChannel(channel){
  await ensureAudio();

  currentChannel = channel;
  channelStart = nowMs();
  pausedByKey = false;

  els.channelButtons.forEach((btn, idx) => {
    btn.classList.toggle('active', idx + 1 === channel);
  });

  const meta = CHANNELS[channel];
  const station = stationStates[channel];

  retuneStationNow(station);

  setLive(true);
  if(!sessionStart) sessionStart = nowMs();
  setMuted(false, true);
  stopAllFX();
  clearSelectedTimers();

  currentMode = 'tuning';
  setStatusTuning();
  syncLiveState();
  updateTelemetry();

  playTuningBurstFor(meta);

  if(station.preparedTrack){
    await playGhostSignal(station.preparedTrack, station.preparedPreviewOffset, meta);
  }

  const lockDelay = meta.mode === 'all-clean'
    ? rand(700, 1200)
    : meta.mode === 'dead-air'
      ? rand(1000, 1800)
      : rand(900, 1500);

  scheduleSelectedStationRefresh(lockDelay);
}

function clearVisibleLog(){
  fullLog.push(`[${String(++logSeq).padStart(5,'0')} ${new Date().toLocaleTimeString()}] --- visible log cleared marker ---`);
  renderVisibleLog();
}

function toggleSecretPause(){
  if(!running) return;

  pausedByKey = !pausedByKey;

  if(pausedByKey){
    try{ els.music.pause(); }catch(e){}
    try{ els.texture.pause(); }catch(e){}
    currentMode = 'paused';
    log('Secret pause engaged');
  } else {
    renderSelectedStation(false);
    log('Secret pause released');
  }

  syncLiveState();
  updateTelemetry();
}

function toggleCleanMode(){
  cleanOverride = !cleanOverride;

  if(cleanOverride){
    stopAllFX();
    log('Clean mode on');
  } else {
    log('Clean mode off');
  }

  updateProcessing(false);
  updateTelemetry();
}

els.startBtn.addEventListener('click', async () => {
  await ensureAudio();

  if(running){
    if(pausedByKey){
      toggleSecretPause();
      return;
    }
    if(muted){
      setMuted(false);
      renderSelectedStation(false);
      log('Unmuted');
    }
    return;
  }

  if(!sessionStart) sessionStart = nowMs();
  await tuneToChannel(currentChannel);
});

els.stopBtn.addEventListener('click', async () => {
  await ensureAudio();
  if(!running) return;
  if(muted) return;

  setMuted(true);
  try{ els.music.pause(); }catch(e){}
  try{ els.texture.pause(); }catch(e){}
  log('Muted');
});

els.clearBtn.addEventListener('click', () => {
  clearVisibleLog();
});

els.fineTuneBtn.addEventListener('click', async () => {
  await ensureAudio();
  beginFineTune();

  if(running && !pausedByKey && !muted){
    renderSelectedStation(false);
  }
});

els.channelButtons.forEach((btn, idx) => {
  btn.addEventListener('click', async () => {
    const channel = idx + 1;
    if(!CHANNELS[channel].enabled){
      log(`${CHANNELS[channel].name} not wired yet`);
      return;
    }
    await tuneToChannel(channel);
  });
});

window.addEventListener('keydown', async e => {
  if(e.repeat) return;

  if(e.key === '\\' && running && Number.isFinite(els.music.duration)){
    try{
      els.music.currentTime = Math.min((els.music.duration || 0) - 0.5, els.music.currentTime + 15);
      log('Skip +15 seconds');
    }catch(err){}
  }

  if(e.key === '}' || e.key === ']'){
    e.preventDefault();
    const payload = fullLog.join('\n') + '\n';
    const blob = new Blob([payload], { type:'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().replace(/[:.]/g,'-');
    a.href = url;
    a.download = `radio-log-${stamp}.txt`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    log('Downloaded full log');
  }

  if(e.key.toLowerCase() === 'p'){
    e.preventDefault();
    toggleSecretPause();
  }

  if(e.key.toLowerCase() === 'c'){
    e.preventDefault();
    toggleCleanMode();
  }

  if(['1','2','3','4','5'].includes(e.key)){
    e.preventDefault();
    await tuneToChannel(Number(e.key));
  }
});

els.music.addEventListener('ended', () => {
  scheduleSelectedStationRefresh(40);
});

els.music.addEventListener('error', () => {
  log(`Main audio error on ${currentTrack ? currentTrack.title : 'unknown track'}`);
  scheduleSelectedStationRefresh(500);
});

function seedStations(){
  for(let i = 1; i <= 5; i++){
    initStation(i);
  }
  for(let i = 1; i <= 5; i++){
    advanceStationToNow(stationStates[i]);
  }
}

updateClock();
seedStations();

setInterval(() => {
  updateClock();

  for(let i = 1; i <= 5; i++){
    advanceStationToNow(stationStates[i]);
  }

  if(running && !pausedByKey){
    updateProcessing(false);
  }

  if(nowMs() - lastTelemetryBeat > 1000){
    updateTelemetry();
    lastTelemetryBeat = nowMs();
  }

  syncFineTuneButton();

  heartbeatCounter += 1;
  if(heartbeatCounter % 10 === 0){
    const station = currentStationState();
    log(
      `tick | ch ${currentChannel} ${CHANNELS[currentChannel].mode} | mode ${currentMode} | station ${station.phase} | main ${station.phase === 'track' && station.currentTrack ? station.currentTrack.title : '—'} | live ${running ? (muted ? 'muted' : (pausedByKey ? 'paused' : 'on')) : 'off'}`
    );
  }
}, 250);

currentChannel = 1;
syncLiveState();
els.status.textContent = 'Stopped';
updateTelemetry();
log('radio debug ready');
</script>
