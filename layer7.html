<style>

/* PAGE SETUP */
body{
  display:flex;
  margin:0;
  font-family: Helvetica, Arial, sans-serif;
  height:100vh;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* LEFT TEXT PANEL */
.text-area{
  width:30%;
  padding:40px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  margin-top:20px;
}

.text-area h1{
  margin:0 0 5px 0;
  font-size:clamp(1.8rem,5vw,2.2em);
  font-weight:900;
}

.text-area p{
  margin:2px 0;
  font-size:clamp(1rem,2.5vw,1.2em);
  line-height:1.2;
  font-weight:600;
}

/* BACK BUTTON */
a.back{
  display:inline-block;
  margin-bottom:20px;
  text-decoration:none;
  color:#fff;
  font-weight:bold;
  letter-spacing:1px;
  font-size:0.9rem;
}

/* IMAGE PANEL */
.image-area{
  width:70%;
  height:100vh;
  overflow-y:auto;
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* IMAGE LINKS */
.image-link{
  width:100%;
  display:flex;
  justify-content:center;
  margin-bottom:40px;
}

/* IMAGES */
.image-link img{
  max-width:95%;
  height:auto;
  display:block;
  cursor:pointer;
  transition:opacity 0.25s ease;
}

.image-link img:hover{
  opacity:0.85;
}

/* MOBILE */
@media(max-width:900px){

  body{
    flex-direction:column;
    height:auto;
    overflow:auto;
  }

  .text-area{
    width:100%;
    padding:20px;
  }

  .image-area{
    width:100%;
    height:auto;
  }

}

</style>
</head>
