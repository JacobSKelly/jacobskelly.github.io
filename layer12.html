<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ambuland Land 2025 — Jacob Kelly</title>

  <style>
    * { box-sizing: border-box; }

    :root{
      --bg:#000;
      --fg:#fff;
      --panel:#0b0b0b;
      --line:rgba(255,255,255,0.12);
      --shadow:0 24px 60px rgba(0,0,0,0.45);
    }

    html, body {
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--fg);
      font-family: Helvetica, Arial, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      overflow:hidden;
    }

    .text-area{
      width:30%;
      padding:40px;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      margin-top:20px;
      z-index:2;
    }

    .text-area h1{
      margin:0 0 6px 0;
      font-size:clamp(1.8rem, 5vw, 2.2rem);
      font-weight:900;
      line-height:1;
    }

    .text-area p{
      margin:2px 0;
      font-size:clamp(1rem, 2.5vw, 1.15rem);
      line-height:1.2;
      font-weight:600;
    }

    .meta{
      margin-top:18px;
      color:rgba(255,255,255,0.72);
      font-size:0.92rem;
      line-height:1.4;
      max-width:28ch;
    }

    a.back{
      display:inline-block;
      margin-bottom:20px;
      color:#fff;
      text-decoration:none;
      font-weight:bold;
      letter-spacing:1px;
      font-size:0.9rem;
    }

    .viewer-shell{
      width:70%;
      min-height:100vh;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
      overflow:hidden;
    }

    .book-stage{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .cover-view,
    .spread-view,
    .back-view{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
    }

    .page-wrap{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#111;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      overflow:hidden;
      user-select:none;
      flex:0 0 auto;
    }

    .page-wrap.cover,
    .page-wrap.backcover{
      cursor:pointer;
    }

    .page-wrap.left{
      cursor:w-resize;
    }

    .page-wrap.right{
      cursor:e-resize;
    }

    .page-wrap::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    canvas{
      display:block;
      width:100%;
      height:100%;
      background:#fff;
      image-rendering:auto;
    }

    .loading,
    .error{
      color:#fff;
      text-align:center;
      line-height:1.5;
      max-width:520px;
    }

    .hint{
      position:absolute;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      color:rgba(255,255,255,0.75);
      font-size:0.88rem;
      letter-spacing:0.2px;
      text-align:center;
      pointer-events:none;
      white-space:nowrap;
    }

    .stats{
      position:absolute;
      top:18px;
      right:22px;
      text-align:right;
      color:rgba(255,255,255,0.7);
      font-size:0.82rem;
      line-height:1.35;
      pointer-events:none;
    }

    @media (max-width: 900px){
      body{
        flex-direction:column;
        overflow:auto;
      }

      .text-area,
      .viewer-shell{
        width:100%;
      }

      .text-area{
        padding:20px;
        margin-top:0;
      }

      .viewer-shell{
        min-height:72vh;
        padding:18px;
      }

      .spread-view{
        gap:10px;
      }

      .hint{
        white-space:normal;
        width:calc(100% - 24px);
        bottom:10px;
      }

      .stats{
        top:10px;
        right:12px;
        font-size:0.74rem;
      }
    }
  </style>
</head>
<body>

  <div class="text-area">
    <a href="index.html" class="back">← Back</a>
    <h1>Ambuland Land 2025</h1>
    <p><strong>Jacob Kelly</strong></p>
    <p>PDF publication.</p>
    <div class="meta">
      A deterministic ten-year deterioration. The same pixels darken for everyone at the same hour.
    </div>
  </div>

  <div class="viewer-shell">
    <div class="stats" id="stats"></div>
    <div class="book-stage" id="bookStage">
      <div class="loading">Loading PDF…</div>
    </div>
    <div class="hint" id="hint"></div>
  </div>

  <script type="module">
    import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.5.207/build/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.5.207/build/pdf.worker.min.mjs";

    const PDF_URL = "https://phfinal.s3.eu-west-2.amazonaws.com/AmbulanceWeb.pdf";

    // ===== Project constants =====
    const BOOK_TITLE = "Ambuland Land 2025";
    const TOTAL_LOGICAL_PAGES = 16;

    // Exact page raster size you want to base the decay on
    const PAGE_PIXEL_WIDTH = 1746;
    const PAGE_PIXEL_HEIGHT = 2478;
    const PIXELS_PER_PAGE = PAGE_PIXEL_WIDTH * PAGE_PIXEL_HEIGHT; // 4,326,588
    const TOTAL_PIXELS = TOTAL_LOGICAL_PAGES * PIXELS_PER_PAGE;   // 69,225,408

    // Ten-year artwork timeline
    const START_DATE = new Date("2025-01-01T00:00:00Z");
    const END_DATE   = new Date("2035-01-01T00:00:00Z");

    // Fixed seed so everyone sees the same loss
    const SEED = 2097152;

    // Secret demo mode
    const DEMO_DURATION_MS = 60000; // one minute
    let demoMode = false;
    let demoStartTime = 0;
    let demoRAF = null;
    let aKeyDown = false;

    const stage = document.getElementById("bookStage");
    const hint = document.getElementById("hint");
    const stats = document.getElementById("stats");

    let pdfDoc = null;

    // modes: cover | spread | backcover
    let mode = "cover";
    let currentLeftPage = 2; // logical pages 2+3 are first spread

    function setHint(text){
      hint.textContent = text || "";
    }

    function clamp(n, min, max){
      return Math.max(min, Math.min(max, n));
    }

    function totalHours(){
      return Math.floor((END_DATE - START_DATE) / 3600000);
    }

    function elapsedHours(){
      const now = Date.now();
      if (now <= START_DATE.getTime()) return 0;
      if (now >= END_DATE.getTime()) return totalHours();
      return Math.floor((now - START_DATE.getTime()) / 3600000);
    }

    function artworkPixelsToBlackNow(){
      const hours = elapsedHours();
      const total = totalHours();
      if (hours <= 0) return 0;
      if (hours >= total) return TOTAL_PIXELS;
      return Math.floor((hours / total) * TOTAL_PIXELS);
    }

    function demoPixelsToBlackNow(){
      if (!demoMode) return 0;
      const elapsed = performance.now() - demoStartTime;
      const progress = clamp(elapsed / DEMO_DURATION_MS, 0, 1);
      return Math.floor(progress * TOTAL_PIXELS);
    }

    function activePixelsToBlackNow(){
      if (demoMode) {
        return Math.max(artworkPixelsToBlackNow(), demoPixelsToBlackNow());
      }
      return artworkPixelsToBlackNow();
    }

    function activeThresholdNow(){
      return activePixelsToBlackNow() / TOTAL_PIXELS;
    }

    function updateStats(){
      const blacked = artworkPixelsToBlackNow();
      const pct = (100 * blacked / TOTAL_PIXELS).toFixed(4);
      stats.innerHTML = `
        ${BOOK_TITLE}<br>
        ${blacked.toLocaleString()} / ${TOTAL_PIXELS.toLocaleString()} darkened<br>
        ${pct}% complete
      `;
    }

    // PDF is backwards:
    // logical 1 -> pdf 16, logical 2 -> pdf 15 ... logical 16 -> pdf 1
    function logicalToPdfPage(logicalPage){
      return (TOTAL_LOGICAL_PAGES - logicalPage) + 1;
    }

    function getPageDisplaySize(singlePage){
      const shell = document.querySelector(".viewer-shell");
      const availW = shell.clientWidth - 40;
      const availH = shell.clientHeight - 90;
      const aspect = PAGE_PIXEL_WIDTH / PAGE_PIXEL_HEIGHT;

      if (singlePage){
        const maxW = availW * 0.72;
        const maxH = availH * 0.92;
        let w = maxW;
        let h = w / aspect;
        if (h > maxH) {
          h = maxH;
          w = h * aspect;
        }
        return { w, h };
      }

      const gap = window.innerWidth <= 900 ? 10 : 18;
      const maxWPerPage = (availW - gap) / 2;
      const maxHPerPage = availH * 0.92;

      let w = maxWPerPage;
      let h = w / aspect;

      if (h > maxHPerPage){
        h = maxHPerPage;
        w = h * aspect;
      }

      return { w, h };
    }

    function hash01(globalIndex){
      let x = (globalIndex ^ SEED) >>> 0;
      x ^= x >>> 16;
      x = Math.imul(x, 0x7feb352d);
      x ^= x >>> 15;
      x = Math.imul(x, 0x846ca68b);
      x ^= x >>> 16;
      return x / 4294967296;
    }

    async function renderLogicalPage(logicalPage, visibleCanvas){
      const pdfPageNumber = logicalToPdfPage(logicalPage);
      const page = await pdfDoc.getPage(pdfPageNumber);

      // Render to temp canvas from the PDF, then resample to exact working grid
      const viewport = page.getViewport({ scale: 1 });
      const tempScale = PAGE_PIXEL_WIDTH / viewport.width;
      const tempViewport = page.getViewport({ scale: tempScale });

      const tempCanvas = document.createElement("canvas");
      tempCanvas.width = Math.round(tempViewport.width);
      tempCanvas.height = Math.round(tempViewport.height);

      const tempCtx = tempCanvas.getContext("2d", { willReadFrequently: true });

      await page.render({
        canvasContext: tempCtx,
        viewport: tempViewport
      }).promise;

      visibleCanvas.width = PAGE_PIXEL_WIDTH;
      visibleCanvas.height = PAGE_PIXEL_HEIGHT;

      const ctx = visibleCanvas.getContext("2d", { willReadFrequently: true });
      ctx.drawImage(tempCanvas, 0, 0, PAGE_PIXEL_WIDTH, PAGE_PIXEL_HEIGHT);

      const img = ctx.getImageData(0, 0, PAGE_PIXEL_WIDTH, PAGE_PIXEL_HEIGHT);
      const data = img.data;
      const threshold = activeThresholdNow();
      const pageOffset = (logicalPage - 1) * PIXELS_PER_PAGE;

      for (let y = 0; y < PAGE_PIXEL_HEIGHT; y++) {
        const rowBase = y * PAGE_PIXEL_WIDTH;

        for (let x = 0; x < PAGE_PIXEL_WIDTH; x++) {
          const pagePixelIndex = rowBase + x;
          const globalIndex = pageOffset + pagePixelIndex;
          const score = hash01(globalIndex);

          if (score < threshold) {
            const i = pagePixelIndex * 4;
            data[i] = 0;
            data[i + 1] = 0;
            data[i + 2] = 0;
            data[i + 3] = 255;
          }
        }
      }

      ctx.putImageData(img, 0, 0);
    }

    async function makePageWrap(logicalPage, className, displayW, displayH){
      const wrap = document.createElement("div");
      wrap.className = `page-wrap ${className}`;
      wrap.style.width = `${Math.round(displayW)}px`;
      wrap.style.height = `${Math.round(displayH)}px`;

      const canvas = document.createElement("canvas");
      wrap.appendChild(canvas);

      await renderLogicalPage(logicalPage, canvas);
      return wrap;
    }

    async function renderCover(){
      stage.innerHTML = "";
      const view = document.createElement("div");
      view.className = "cover-view";

      const size = getPageDisplaySize(true);
      const pageWrap = await makePageWrap(1, "cover", size.w, size.h);

      pageWrap.addEventListener("click", () => {
        mode = "spread";
        currentLeftPage = 2;
        renderBook();
      });

      view.appendChild(pageWrap);
      stage.appendChild(view);
      setHint("Click the cover to open");
    }

    async function renderBackCover(){
      stage.innerHTML = "";
      const view = document.createElement("div");
      view.className = "back-view";

      const size = getPageDisplaySize(true);
      const pageWrap = await makePageWrap(16, "backcover", size.w, size.h);

      pageWrap.addEventListener("click", () => {
        mode = "spread";
        currentLeftPage = 14;
        renderBook();
      });

      view.appendChild(pageWrap);
      stage.appendChild(view);
      setHint("Click to return inside");
    }

    async function renderSpread(){
      stage.innerHTML = "";
      const view = document.createElement("div");
      view.className = "spread-view";

      const size = getPageDisplaySize(false);

      const leftWrap = await makePageWrap(currentLeftPage, "left", size.w, size.h);
      const rightPage = currentLeftPage + 1;
      const rightWrap = await makePageWrap(rightPage, "right", size.w, size.h);

      leftWrap.addEventListener("click", () => {
        if (currentLeftPage <= 2) {
          mode = "cover";
        } else {
          currentLeftPage -= 2;
        }
        renderBook();
      });

      rightWrap.addEventListener("click", () => {
        if (currentLeftPage >= 14) {
          mode = "backcover";
        } else {
          currentLeftPage += 2;
        }
        renderBook();
      });

      view.appendChild(leftWrap);
      view.appendChild(rightWrap);
      stage.appendChild(view);

      if (currentLeftPage <= 2) {
        setHint("Click left page for cover • Click right page to go forward");
      } else if (currentLeftPage >= 14) {
        setHint("Click left page to go back • Click right page for back cover");
      } else {
        setHint("Click left page to go back • Click right page to go forward");
      }
    }

    async function renderBook(){
      if (!pdfDoc) return;

      stage.innerHTML = '<div class="loading">Rendering…</div>';
      updateStats();

      try {
        if (mode === "cover") {
          await renderCover();
        } else if (mode === "backcover") {
          await renderBackCover();
        } else {
          await renderSpread();
        }
      } catch (err) {
        console.error(err);
        stage.innerHTML = `
          <div class="error">
            Could not render the PDF.<br><br>
            Check the URL and S3 CORS settings.
          </div>
        `;
      }
    }

    async function loadPDF(){
      try {
        const task = pdfjsLib.getDocument(PDF_URL);
        pdfDoc = await task.promise;
        await renderBook();
      } catch (err) {
        console.error(err);
        stage.innerHTML = `
          <div class="error">
            Failed to load the PDF.<br><br>
            Check the file URL and CORS configuration on S3.
          </div>
        `;
      }
    }

    function startDemoMode(){
      if (demoMode) return;
      demoMode = true;
      demoStartTime = performance.now();
      tickDemo();
    }

    function stopDemoMode(){
      demoMode = false;
      if (demoRAF) {
        cancelAnimationFrame(demoRAF);
        demoRAF = null;
      }
      renderBook();
    }

    function tickDemo(){
      if (!demoMode) return;

      renderBook().finally(() => {
        const elapsed = performance.now() - demoStartTime;
        if (elapsed >= DEMO_DURATION_MS) {
          demoMode = false;
          demoRAF = null;
          renderBook();
          return;
        }
        demoRAF = requestAnimationFrame(tickDemo);
      });
    }

    window.addEventListener("resize", () => {
      if (pdfDoc) renderBook();
    });

    window.addEventListener("keydown", (e) => {
      if (!pdfDoc) return;

      if ((e.key === "a" || e.key === "A") && !aKeyDown) {
        aKeyDown = true;
        startDemoMode();
      }

      if (mode === "cover") {
        if (e.key === "ArrowRight" || e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          mode = "spread";
          currentLeftPage = 2;
          renderBook();
        }
        return;
      }

      if (mode === "backcover") {
        if (e.key === "ArrowLeft") {
          mode = "spread";
          currentLeftPage = 14;
          renderBook();
        }
        return;
      }

      if (e.key === "ArrowLeft") {
        if (currentLeftPage <= 2) {
          mode = "cover";
        } else {
          currentLeftPage -= 2;
        }
        renderBook();
      } else if (e.key === "ArrowRight") {
        if (currentLeftPage >= 14) {
          mode = "backcover";
        } else {
          currentLeftPage += 2;
        }
        renderBook();
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.key === "a" || e.key === "A") {
        aKeyDown = false;
        stopDemoMode();
      }
    });

    window.addEventListener("blur", () => {
      aKeyDown = false;
      stopDemoMode();
    });

    loadPDF();
  </script>
</body>
</html>
