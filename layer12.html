<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ambuland Land 2025 - Jacob Kelly</title>

  <style>
    * { box-sizing: border-box; }

    body{
      display:flex;
      margin:0;
      font-family: Helvetica, Arial, sans-serif;
      min-height:100vh;
      overflow:hidden;
      background:#000;
      color:#fff;
    }

    /* LEFT PANEL */
    .text-area{
      width:30%;
      padding:40px;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      margin-top:20px;
      z-index:2;
    }

    .text-area h1{
      margin:0 0 5px 0;
      font-size:clamp(1.8rem,5vw,2.2rem);
      font-weight:900;
      color:#fff;
    }

    .text-area p{
      margin:2px 0;
      font-size:clamp(1rem,2.5vw,1.2rem);
      line-height:1.2;
      font-weight:600;
      color:#fff;
    }

    a.back{
      display:inline-block;
      margin-bottom:20px;
      text-decoration:none;
      color:#fff;
      font-weight:bold;
      letter-spacing:1px;
      font-size:0.9rem;
    }

    /* RIGHT AREA */
    .viewer-shell{
      width:70%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:30px;
      position:relative;
      overflow:hidden;
    }

    .book-stage{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .spread,
    .cover-view{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      max-width:100%;
      max-height:100%;
    }

    .page-wrap{
      display:flex;
      align-items:center;
      justify-content:center;
      background:#111;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 20px 50px rgba(0,0,0,0.45);
      overflow:hidden;
      user-select:none;
    }

    .cover-view .page-wrap{
      cursor:pointer;
    }

    .spread .page-wrap.left{
      cursor:w-resize;
    }

    .spread .page-wrap.right{
      cursor:e-resize;
    }

    canvas{
      display:block;
      width:100%;
      height:100%;
      background:#fff;
    }

    .hint{
      position:absolute;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      font-size:0.9rem;
      letter-spacing:0.4px;
      color:rgba(255,255,255,0.75);
      text-align:center;
      pointer-events:none;
    }

    .loading,
    .error{
      font-size:1rem;
      color:#fff;
      text-align:center;
      max-width:540px;
      line-height:1.5;
    }

    @media (max-width: 900px){
      body{
        flex-direction:column;
        overflow:auto;
      }

      .text-area,
      .viewer-shell{
        width:100%;
      }

      .text-area{
        padding:20px;
        margin-top:0;
      }

      .viewer-shell{
        min-height:70vh;
        padding:20px;
      }

      .spread{
        gap:10px;
      }

      .hint{
        bottom:10px;
        font-size:0.8rem;
        padding:0 16px;
      }
    }
  </style>
</head>
<body>

  <div class="text-area">
    <a href="index.html" class="back">← Back</a>
    <h1>Ambuland Land 2025</h1>
    <p><strong>PDF Publication</strong></p>
    <p>Jacob Kelly.</p>
  </div>

  <div class="viewer-shell">
    <div class="book-stage" id="bookStage">
      <div class="loading" id="status">Loading PDF…</div>
    </div>
    <div class="hint" id="hint" style="display:none;"></div>
  </div>

  <script type="module">
    import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.5.207/build/pdf.min.mjs";

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.5.207/build/pdf.worker.min.mjs";

    // CHANGE THIS TO YOUR S3 PDF URL
    const PDF_URL = "https://your-bucket.s3.eu-west-2.amazonaws.com/ambuland-land-2025.pdf";

    const stage = document.getElementById("bookStage");
    const statusEl = document.getElementById("status");
    const hintEl = document.getElementById("hint");

    let pdfDoc = null;
    let totalPages = 0;

    // Mode:
    // "cover" = page 1 only
    // "spread" = show two inner pages
    let mode = "cover";

    // Left page of current spread.
    // First open spread should be pages 2 and 3.
    let currentLeftPage = 2;

    function setHint(text){
      hintEl.textContent = text;
      hintEl.style.display = text ? "block" : "none";
    }

    function clampSpreadStart(pageNum){
      if (totalPages <= 1) return 2;
      if (pageNum < 2) return 2;

      // Keep left page even: 2,4,6...
      if (pageNum % 2 !== 0) pageNum -= 1;

      if (pageNum > totalPages) {
        pageNum = totalPages % 2 === 0 ? totalPages : totalPages - 1;
      }

      if (pageNum < 2) pageNum = 2;
      return pageNum;
    }

    function getMaxCanvasSize(single = false){
      const shell = document.querySelector(".viewer-shell");
      const shellStyles = getComputedStyle(shell);
      const padX = parseFloat(shellStyles.paddingLeft) + parseFloat(shellStyles.paddingRight);
      const padY = parseFloat(shellStyles.paddingTop) + parseFloat(shellStyles.paddingBottom);

      const maxWidth = shell.clientWidth - padX - 20;
      const maxHeight = shell.clientHeight - padY - 50;

      if (single) {
        return { width: maxWidth, height: maxHeight };
      }

      return {
        width: maxWidth,
        height: maxHeight
      };
    }

    async function renderPageToCanvas(pageNum, targetCanvas, maxWidth, maxHeight){
      const page = await pdfDoc.getPage(pageNum);
      const viewport = page.getViewport({ scale: 1 });

      const scale = Math.min(
        maxWidth / viewport.width,
        maxHeight / viewport.height
      );

      const scaledViewport = page.getViewport({ scale });

      const context = targetCanvas.getContext("2d");
      targetCanvas.width = scaledViewport.width;
      targetCanvas.height = scaledViewport.height;

      await page.render({
        canvasContext: context,
        viewport: scaledViewport
      }).promise;

      return {
        width: scaledViewport.width,
        height: scaledViewport.height
      };
    }

    async function renderCover(){
      stage.innerHTML = "";

      const wrap = document.createElement("div");
      wrap.className = "cover-view";

      const pageWrap = document.createElement("div");
      pageWrap.className = "page-wrap";

      const canvas = document.createElement("canvas");
      pageWrap.appendChild(canvas);
      wrap.appendChild(pageWrap);
      stage.appendChild(wrap);

      const max = getMaxCanvasSize(true);

      const result = await renderPageToCanvas(1, canvas, max.width * 0.7, max.height * 0.92);

      pageWrap.style.width = result.width + "px";
      pageWrap.style.height = result.height + "px";

      pageWrap.addEventListener("click", () => {
        if (totalPages > 1) {
          mode = "spread";
          currentLeftPage = 2;
          renderBook();
        }
      });

      setHint(totalPages > 1 ? "Click the cover to open" : "");
    }

    async function renderSpread(){
      stage.innerHTML = "";

      const rightPageNum = currentLeftPage + 1;

      const spread = document.createElement("div");
      spread.className = "spread";

      const leftWrap = document.createElement("div");
      leftWrap.className = "page-wrap left";

      const rightWrap = document.createElement("div");
      rightWrap.className = "page-wrap right";

      const leftCanvas = document.createElement("canvas");
      const rightCanvas = document.createElement("canvas");

      leftWrap.appendChild(leftCanvas);
      spread.appendChild(leftWrap);

      const max = getMaxCanvasSize(false);

      // Rough split for two pages + gap
      const perPageWidth = Math.min((max.width - 18) / 2, max.height * 0.75);
      const perPageHeight = max.height * 0.92;

      const leftResult = await renderPageToCanvas(
        currentLeftPage,
        leftCanvas,
        perPageWidth,
        perPageHeight
      );

      leftWrap.style.width = leftResult.width + "px";
      leftWrap.style.height = leftResult.height + "px";

      if (rightPageNum <= totalPages) {
        spread.appendChild(rightWrap);

        const rightResult = await renderPageToCanvas(
          rightPageNum,
          rightCanvas,
          perPageWidth,
          perPageHeight
        );

        rightWrap.appendChild(rightCanvas);
        rightWrap.style.width = rightResult.width + "px";
        rightWrap.style.height = rightResult.height + "px";
      }

      stage.appendChild(spread);

      leftWrap.addEventListener("click", () => {
        // If on first spread, clicking left goes back to cover
        if (currentLeftPage <= 2) {
          mode = "cover";
          renderBook();
          return;
        }

        currentLeftPage = clampSpreadStart(currentLeftPage - 2);
        renderBook();
      });

      rightWrap.addEventListener("click", () => {
        if (currentLeftPage + 2 <= totalPages) {
          currentLeftPage = clampSpreadStart(currentLeftPage + 2);
          renderBook();
        }
      });

      const hasNext = currentLeftPage + 2 <= totalPages;
      const hasPrev = currentLeftPage > 2;

      if (hasPrev && hasNext) {
        setHint("Click left page to go back • Click right page to go forward");
      } else if (hasPrev) {
        setHint("Click left page to go back");
      } else if (hasNext) {
        setHint("Click left page for cover • Click right page to go forward");
      } else {
        setHint("Click left page to go back");
      }
    }

    async function renderBook(){
      try {
        stage.innerHTML = '<div class="loading">Rendering…</div>';

        if (mode === "cover") {
          await renderCover();
        } else {
          await renderSpread();
        }
      } catch (err) {
        console.error(err);
        stage.innerHTML = `
          <div class="error">
            Could not render the PDF.<br><br>
            Make sure the file URL is correct and your S3 bucket allows CORS.
          </div>
        `;
        setHint("");
      }
    }

    async function loadPDF(){
      try {
        const loadingTask = pdfjsLib.getDocument(PDF_URL);
        pdfDoc = await loadingTask.promise;
        totalPages = pdfDoc.numPages;

        await renderBook();
      } catch (err) {
        console.error(err);
        stage.innerHTML = `
          <div class="error">
            Failed to load the PDF.<br><br>
            Check the PDF URL and CORS settings on your S3 bucket.
          </div>
        `;
      }
    }

    window.addEventListener("resize", () => {
      if (pdfDoc) renderBook();
    });

    window.addEventListener("keydown", (e) => {
      if (!pdfDoc) return;

      if (mode === "cover") {
        if ((e.key === "ArrowRight" || e.key === "Enter" || e.key === " ")) {
          if (totalPages > 1) {
            mode = "spread";
            currentLeftPage = 2;
            renderBook();
          }
        }
        return;
      }

      if (e.key === "ArrowLeft") {
        if (currentLeftPage <= 2) {
          mode = "cover";
        } else {
          currentLeftPage = clampSpreadStart(currentLeftPage - 2);
        }
        renderBook();
      }

      if (e.key === "ArrowRight") {
        if (currentLeftPage + 2 <= totalPages) {
          currentLeftPage = clampSpreadStart(currentLeftPage + 2);
          renderBook();
        }
      }
    });

    loadPDF();
  </script>
</body>
</html>
